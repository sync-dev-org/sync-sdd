# Reference Document Index
# Skills read this index to select relevant reference documents by topic.
# Paths are relative to .sdd/lib/references/
# load: always    — unconditionally read (common/ documents)
# load: on_demand — read when keywords match the task
# load: explicit  — read only when a skill/prompt explicitly names this document

entries:
  - path: common/bash-security-heuristics.md
    category: platform
    load: always
    summary: "Claude Code Bash security heuristics avoidance guide — patterns and alternatives to avoid approval prompts"
    keywords: [bash, security, heuristics, approval, settings.json, allow-list, tmux, shell]

  - path: common/tmux-integration.md
    category: platform
    load: always
    summary: "tmux integration patterns — MultiView Grid, Slot Management, Pattern A (Server Lifecycle), Pattern B (One-Shot Command), Orphan Cleanup"
    keywords: [tmux, pane, grid, slot, multiview, server, one-shot, orphan, send-keys, wait-for]

  - path: claude/agent-tool-reference.md
    category: platform
    load: on_demand
    summary: "Agent tool specification — subagent_type, model, run_in_background, built-in types, model aliases"
    keywords: [agent, subagent, dispatch, model, background, built-in, tool]

  - path: claude/agent-tool-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for agent-tool-reference.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, agent-tool]

  - path: claude/subagent-definition-reference.md
    category: platform
    load: on_demand
    summary: "SubAgent definition file (.claude/agents/*.md) YAML frontmatter specification — model, tools, description, hooks"
    keywords: [subagent, agent-definition, frontmatter, yaml, tools, model, hooks]

  - path: claude/subagent-definition-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for subagent-definition-reference.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, subagent-definition]

  - path: claude/agent-team-reference.md
    category: platform
    load: explicit
    summary: "Agent Team (experimental) specification — teammateMode, cost, plan approval, limitations"
    keywords: [agent-team, teammate, experimental, cost, plan, multi-agent]

  - path: claude/agent-team-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for agent-team-reference.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, agent-team]

  - path: claude/skill-reference.md
    category: platform
    load: on_demand
    summary: "Agent Skills specification — SKILL.md format, frontmatter, description, allowed-tools, triggering"
    keywords: [skill, SKILL.md, frontmatter, description, triggering, allowed-tools]

  - path: claude/skill-reference-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for skill-reference.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, skill-reference]
