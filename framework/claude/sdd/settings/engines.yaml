# External Engine Configuration
# Framework default — overwritten by install.sh --update/--force.
# To use a different engine or model, pass --briefer-engine / --inspector-engine / --auditor-engine
# arguments to /sdd-review or /sdd-review-self.

# --- Engine Traits (platform characteristics) ---
# Defines WHAT each engine is, not HOW to invoke it.
# Command construction logic lives in consumer SKILL.md files.
# "subagents" is the built-in fallback — always available, no CLI needed.
engines:
  codex:
    install_check: "npx -y @openai/codex --version"
    effort_support: true    # via -c model_reasoning_effort='"<effort>"'

  claude:
    install_check: "claude --version"
    effort_support: true    # via env CLAUDE_CODE_EFFORT_LEVEL=<effort>

  gemini:
    install_check: "npx -y @google/gemini-cli --version"
    effort_support: false   # requires settings file rewrite; not supported

  subagents:
    install_check: "true"
    effort_support: true    # via prompt keyword (ultrathink = high)

# --- Safety: MUST NEVER execute ---
# Injected into every agent prompt as a prohibition list.
# Applies regardless of engine or approval mode.
deny_patterns:
  - "rm -rf /"
  - "rm -rf ~"
  - "rm -rf ."
  - "rm -rf *"
  - "git push --force"
  - "git push -f"
  - "git reset --hard"
  - "shutdown"
  - "reboot"
  - "> /dev/"
  - "mkfs"
  - "dd if="
  - ":(){:|:&};:"

# --- Level Chain (escalation order) ---
# L1-L6: ascending capability/cost. L0: infrastructure fallback (subagents).
# Escalation: infra failure (install_check) → next level, ultimate → L0.
# NO-GO → same level retry → user escalate (no auto model escalation).
# Sticky per session (state.yaml), reset on sdd-start.
levels:
  L0:
    engine: subagents
    model: claude-opus-4-6
    effort: medium
  L1:
    engine: codex
    model: gpt-5.3-codex-spark
    effort: high
  L2:
    engine: codex
    model: gpt-5.4
    effort: medium
  L3:
    engine: codex
    model: gpt-5.4
    effort: high
  L4:
    engine: claude
    model: claude-sonnet-4-6
    effort: high
  L5:
    engine: claude
    model: claude-opus-4-6
    effort: medium
  L6:
    engine: claude
    model: claude-opus-4-6
    effort: high

# --- Escalation Rules ---
escalation:
  infra_fallback: L0        # ultimate fallback when no external CLI available
  no_go_policy: same_level  # NO-GO retries at current level, no auto-escalation
  sticky: true              # escalated level persists within session
  sticky_reset: sdd-start   # reset trigger

# --- Role Configuration ---
# Each stage specifies start_level (resolved from level chain above).
# Skill arguments (--briefer-engine etc.) override start_level.
# "timeout" is role-wide (shared across all stages).
roles:
  review-self:
    timeout: 900
    stages:
      briefer:
        start_level: L1
      inspectors:
        start_level: L2
      auditor:
        start_level: L3
      builder:
        start_level: L2
  review:
    timeout: 1200
    stages:
      briefer:
        start_level: L1
      inspectors:
        start_level: L2
      auditor:
        start_level: L3
