# External Engine Configuration
# Framework default — overwritten by install.sh --update/--force.
# To use a different engine or model, pass --briefer-engine / --inspector-engine / --auditor-engine
# arguments to /sdd-review or /sdd-review-self.

# --- Tier 1: Engine Traits (platform characteristics) ---
# Defines WHAT each engine is, not HOW to invoke it.
# Command construction logic lives in consumer SKILL.md files.
# "subagents" is the built-in fallback — always available, no CLI needed.
engines:
  codex:
    install_check: "npx -y @openai/codex --version"

  claude:
    install_check: "claude --version"

  gemini:
    install_check: "npx -y @google/gemini-cli --version"

  subagents:
    install_check: "true"

# --- Safety: MUST NEVER execute ---
# Injected into every agent prompt as a prohibition list.
# Applies regardless of engine or approval mode.
deny_patterns:
  - "rm -rf /"
  - "rm -rf ~"
  - "rm -rf ."
  - "rm -rf *"
  - "git push --force"
  - "git push -f"
  - "git reset --hard"
  - "shutdown"
  - "reboot"
  - "> /dev/"
  - "mkfs"
  - "dd if="
  - ":(){:|:&};:"

# --- Tier 2: Role Configuration ---
# Each role defines per-stage engine/model explicitly.
# Stages without engine → subagents fallback.
# External engine failure → subagents fallback.
# "timeout" is role-wide (shared across all stages).
# "tools" restricts allowed tools (null = full permission).
roles:
  review-self:
    timeout: 900
    stages:
      briefer:
        engine: codex
        model: gpt-5.3-codex-spark
      inspectors:
        engine: codex
        model: gpt-5.3-codex
      auditor:
        engine: claude
        model: claude-sonnet-4-6
      builder:
        engine: claude
        model: claude-sonnet-4-6
  review:
    timeout: 1200
    stages:
      briefer:
        engine: codex
        model: gpt-5.3-codex-spark
      inspectors:
        engine: codex
        model: gpt-5.3-codex
      auditor:
        engine: claude
        model: claude-sonnet-4-6
