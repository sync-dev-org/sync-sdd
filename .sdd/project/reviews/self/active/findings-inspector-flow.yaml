scope: "inspector-flow"
issues:
  - id: "F1"
    severity: "H"
    category: "wave-quality-gate"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:276"
    summary: "Dead-code レビューの NO-GO が再検証されず、そのまま Wave QG を通過し得る"
    detail: "`run.md` は dead-code レビューで NO-GO が出た場合に Builder で 1 回だけ inline fix して cross-check へ進むよう定義していますが、続く cross-check は `impl` レビューであり、`sdd-review` の Inspector 集合には `inspector-dead-settings` / `inspector-dead-code` / `inspector-dead-specs` / `inspector-dead-tests` が含まれません。dead-code 専用の観点が fix 後に再確認されないため、未解消の dead-code 系問題が残っても wave 完了に到達できます。"
    impact: "Wave レベルの品質ゲートが dead-code 観点で閉じず、不要コード・孤立テスト・死んだ設定が残ったまま `implementation-complete` の波として確定する恐れがあります。"
    recommendation: "dead-code の NO-GO 後は dead-code レビュー自体を再実行するか、少なくとも dead-code 専用 Inspector を再評価する補助ステップを追加し、GO/CONDITIONAL になるまで cross-check に進めないようにしてください。"
  - id: "F2"
    severity: "H"
    category: "verdict-persistence"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:191"
    summary: "pipeline auto-fix 後の verdict 更新責務が欠落し、履歴が verdict-format と整合しない"
    detail: "`sdd-review` は pipeline mode では `verdict.yaml` を返して auto-fix を orchestration 側へ委譲しますが、`run.md` の Design/Impl Review 後処理は counter 更新と Architect/Builder 再 dispatch しか定義していません。`verdict-format.md` は Builder 修正後に `verdict.yaml` の `resolution` / `resolution_note` / `disposition` を更新し、その状態を `verdicts.yaml` へ反映する前提ですが、その更新手順が `run.md` にありません。同じ欠落は `revise.md` の 'Handle verdict per ...' でも具体化されていません。"
    impact: "`NO-GO-FIXED` や `SPEC-UPDATE-CASCADED` の batch 状態、`tracked/resolved` の繰り越し、過去 verdict の監査証跡が正しく残らず、resume や後続レビューで誤判定を招きます。"
    recommendation: "run/revise の auto-fix/cascade 完了時に、対象 batch の `verdict.yaml` を更新してから `verdicts.yaml` へ反映する明示ステップを追加してください。少なくとも `user_decision` / `resolution` / `disposition` / `resolved` の更新責務を orchestration 側へ文書化する必要があります。"
  - id: "F3"
    severity: "M"
    category: "revise-escalation"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:257"
    summary: "Cross-Cutting revise のレビュー失敗時エスカレーションが粗く、Single-Spec/run と復旧契約が揃っていない"
    detail: "Cross-Cutting Step 9 は NO-GO / SPEC-UPDATE-NEEDED の再試行と counter 上限までは書いていますが、上限到達後は単に 'escalate to user' としか定義していません。`run.md` Step 7/8 のような fix / skip / abort / manual-fix、counter reset、部分完了 spec の扱い、resume 経路がありません。Part A から Part B へ昇格したケースでも、この曖昧な契約に切り替わります。"
    impact: "Cross-Cutting へ昇格した revision が失敗した場合、どの spec を維持・巻き戻し・継続するかが実装者判断に委ねられ、途中状態の spec 群を不整合のまま残すリスクがあります。"
    recommendation: "Cross-Cutting Step 9 にも `run.md` と同等の exhaustion protocol を追加し、ユーザー選択肢、counter reset 条件、spec の phase/blocking 遷移、再開方法を明示してください。"
  - id: "F4"
    severity: "L"
    category: "verdict-format"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:493"
    summary: "self-review の scope 名が active verdict と index verdict で一致していない"
    detail: "self-review Auditor テンプレートは `verdict-auditor.yaml` に `scope: \"self\"` を書く一方、`sdd-review-self` の永続化ステップは `verdicts.yaml` へ `scope: \"framework\"` を append します。同じ review run の active 成果物と index 成果物で scope 識別子が変わるため、メタデータ整合性が落ちています。"
    impact: "現状はパスで辿れるため致命傷ではありませんが、scope ベースで集計・比較する将来の自動処理では self-review だけ特別扱いが必要になります。"
    recommendation: "self-review の canonical scope 名を 1 つに統一し、`verdict-auditor.yaml` / `verdict.yaml` / `verdicts.yaml` の全段で同じ値を使ってください。"
notes: |
  Router 自体の refs 読み分け (`SKILL.md` Step 101-110)、empty roadmap / 1-spec / blocked spec の基本ガード、Design/Impl の基礎 phase gate は概ね整合していました。
  主な欠陥は、Wave QG の dead-code 分岐、pipeline mode の verdict 更新責務、Cross-Cutting revise の exhaustion 契約、self-review の metadata 一貫性に集中しています。
