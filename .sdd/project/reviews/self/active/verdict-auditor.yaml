    location: "framework/claude/skills/sdd-handover/SKILL.md:77"
    summary: "status: superseded で pruning する設計なのに decision を superseded に遷移させる運用が定義されていない"
    detail: "CLAUDE.md は decisions.yaml を append-only としつつ各 entry に status: active|superseded を持たせ、/sdd-handover は consolidation 時に status: superseded を除外・アーカイブすると定義している。しかし対象ファイル群には「どの条件で既存 decision を superseded に変更するか」「誰がその更新を行うか」の規則がない。旧 superseded_by を外した後の代替遷移が未定義。"
    impact: "置き換え済み decision が active のまま残り続け、Consolidation は実質的に pruning できない。mutually-exclusive な決定が並存し、FP 判定や handover の Key Decisions 要約がぶれる。"
    recommendation: "append-only 制約と両立する supersede プロトコルを追加する。例: handover 時に新旧 decision の対応規則で旧 entry を status: superseded に書き換えるか、replacement metadata を復活させて deterministic に archive 対象を決めるかのいずれかに統一する。"
