scope: "inspector-dynamic-1-session-migration"
issues:
  - id: "F1"
    severity: "H"
    category: "migration"
    location: "install.sh:415"
    summary: "既存の session/state.yaml を無条件上書きし、tmux 再開状態を壊し得る"
    detail: "v2.6.0 移行は `.sdd/state.yaml` を `.sdd/session/state.yaml` へ無条件で `mv` しており、すでに `.sdd/session/state.yaml` が存在する部分移行済み環境や手動退避済み環境を考慮していません。`sdd-start` は `.sdd/session/state.yaml` を orphan cleanup と grid 再利用の唯一の入力として読むため、古い root 側 state が新しい session 側 state を上書きすると、pane_id/window_id の整合が崩れます。"
    impact: "更新後の初回起動で誤った window_id/pane_id を信頼し、孤児 pane の誤検知や別 session の grid 再利用を誘発して起動状態を壊すリスクがあります。"
    recommendation: "移行先が既に存在する場合は上書きせず、より新しい側を優先するか、競合として退避・警告してください。少なくとも `state.yaml` は `mv` 前に存在確認し、手動解決を促すべきです。"
  - id: "F2"
    severity: "H"
    category: "migration"
    location: "install.sh:417"
    summary: "v2.5.x の issues.yaml が session/ へ移行されず、旧 handover 配下に取り残される"
    detail: "移行対象として `handover.md` `decisions.yaml` `knowledge.yaml` は扱っていますが、`issues.yaml` が欠落しています。一方で runtime 側は `sdd-start`、`/sdd-handover`、`CLAUDE.md` の Session Persistence で `.sdd/session/issues.yaml` を現行の正規パスとして前提化しています。"
    impact: "既存の issue 履歴が更新後セッションから見えなくなり、open/resolved 状態の引き継ぎが失われます。さらに `.sdd/handover/issues.yaml` が残るため `rmdir .sdd/handover` も失敗し、旧形式が残留したままになります。"
    recommendation: "`.sdd/handover/issues.yaml` も `.sdd/session/issues.yaml` へ移行対象に追加し、既存 target がある場合の競合ルールも定義してください。"
  - id: "F3"
    severity: "M"
    category: "archive"
    location: "install.sh:421"
    summary: "既存 handovers/ がある状態で移行すると archive が handovers/handovers/ にネストする"
    detail: "`.sdd/handover/handovers` を `.sdd/session/handovers` へそのまま `mv` しているため、移行先ディレクトリが既に存在するケースでは POSIX `mv` の挙動により `.sdd/session/handovers/handovers/` が作られます。`/sdd-handover` は archive の保存先を `.sdd/session/handovers/{timestamp}.md` のフラット構造として扱います。"
    impact: "旧 archive だけが別階層に隠れ、運用ルールと実ファイル配置が不一致になります。次回以降の archive は期待位置に増えるため、過去 handover の探索・比較が不完全になります。"
    recommendation: "移行先を事前作成して中身をマージするか、既存 `handovers/` がある場合は contents 単位で移送してください。少なくとも directory-to-directory の `mv` をそのまま使わない方が安全です。"
  - id: "F4"
    severity: "L"
    category: "compatibility"
    location: "install.sh:424"
    summary: "旧 decisions.md / buffer.md は legacy 名へ退避されるだけで、現行 session 読み取り系から不可視になる"
    detail: "pre-v2.5.0 形式の `decisions.md` と `buffer.md` は `decisions-legacy.md` / `knowledge-legacy.md` に rename されますが、`framework/claude/` 全体の現行 runtime 参照は `.sdd/session/decisions.yaml` と `.sdd/session/knowledge.yaml` に統一されており、legacy 名を読む箇所は見当たりません。"
    impact: "古い install から更新した利用者は、ファイル自体は残る一方で意思決定履歴や knowledge が起動時コンテキストに復元されず、セッション継続性が静かに弱化します。"
    recommendation: "Markdown から現行 YAML への変換を提供するか、少なくとも install 時に legacy ファイルは自動読込されない旨を警告して手動移行手順を案内してください。"
notes: |
  `framework/claude/` 側の現行参照は確認した範囲で `.sdd/session/*` に揃っており、旧 `.sdd/handover` や `session.md` / `decisions.md` を runtime で参照する混在は見当たりませんでした。

  したがって主リスクは参照側ではなく `install.sh` の移行品質です。特に `state.yaml` の上書きと `issues.yaml` の未移行は、更新直後の再開体験を直接壊し得ます。
