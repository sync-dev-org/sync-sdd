scope: "inspector-compliance"
issues:
  - id: "F1"
    severity: "H"
    category: "permissions"
    location: "framework/claude/settings.json:6"
    summary: "Skill 権限が exact-match のままで、引数付き Skill dispatch を事前許可できていない"
    detail: "`permissions.allow` の Skill ルールが `Skill(sdd-roadmap)` などの exact-match 形式になっている一方、実装側は `Skill(skill=\"sdd-review\", args=\"design {feature}\")` のように引数付きで sub-skill を呼び出している。Claude Code の権限ルールは `Tool(specifier)` が個別一致で、prefix 許可は `*` を使うため、この設定では引数付き dispatch が許可対象から外れる。"
    impact: "レビューやロードマップの自動委譲時に不要な permission prompt や拒否が発生し、想定した非対話パイプラインが停止する。特に `/sdd-roadmap` から `/sdd-review` への委譲が影響を受ける。"
    recommendation: "引数を取る skill は `Skill(name *)` 形式に変更する。少なくとも `sdd-review`, `sdd-roadmap`, `sdd-status`, `sdd-release`, `sdd-reboot` は prefix-match にし、引数を取らない skill だけ exact-match を維持する。"
