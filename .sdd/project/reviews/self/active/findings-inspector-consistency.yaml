  | Roadmap ref graph | `skills/sdd-roadmap/SKILL.md`, `refs/{design,run,revise,impl,crud}.md`, `skills/sdd-reboot/refs/reboot.md` | OK: 重大な循環依存は未検出。reboot は run.md を参照するが design-only に制限している |

  Additional context
  - 指定された対象ファイルは全件存在確認済み。
  - command count は 10、agent count は 5 で現行ツリーと一致。
  - `general-purpose` に対応する agent file 不在はテンプレート注記どおり intentional のため未指摘。
