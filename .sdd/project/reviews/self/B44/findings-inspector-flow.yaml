scope: "inspector-flow"
issues:
  - id: "F1"
    severity: "H"
    category: "verdict-persistence"
    location: "framework/claude/skills/sdd-roadmap/SKILL.md:115"
    description: "Router 共有プロトコルが `verdicts.yaml` を見出し追記型の旧フォーマットとして記述しており、実際の YAML `batches` スキーマと矛盾しています。"
    impact: "Lead が Router 側の説明に従うと `verdicts.yaml` を非互換形式で更新し、`/sdd-start`・`/sdd-status`・resume 判定が batch 履歴を正しく読めなくなります。"
    recommendation: "この節を `verdict-format.md` §4 と `sdd-review` Step 9 の YAML 永続化仕様へ置き換え、Router からは旧フォーマット説明を削除してください。"
  - id: "F2"
    severity: "H"
    category: "wave-scope-routing"
    location: "framework/claude/skills/sdd-review/SKILL.md:162"
    description: "wave-scoped review と wave dead-code review の scope directory がどちらも `{{SDD_DIR}}/project/reviews/wave/` に固定されており、`verdict-format.md` の `wave-{N}` スコープ定義と一致していません。"
    impact: "Wave ごとの verdict 履歴・active archive・batch 連番が同一ディレクトリに混在し、Wave QG の再実行や履歴参照で別 wave の結果を誤読する恐れがあります。"
    recommendation: "wave-scoped review は `project/reviews/wave-{N}/` に統一し、`refs/run.md` の永続化先説明と `sdd-start`/`sdd-status` の参照前提も同じ命名に揃えてください。"
  - id: "F3"
    severity: "H"
    category: "cross-cutting-flow"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:161"
    description: "Cross-Cutting Mode は Step 4 と Step 8 で `specs/.cross-cutting/{id}/` を使う前提ですが、その `{id}` / `$CC_ID` は Step 9 で初めて生成されています。"
    impact: "brief.md と shared-research.md の保存先が実行時に未定義になり、Architect へ渡す shared brief 経路が成立しません。Cross-Cutting revise の Router→refs 導線が途中で欠落します。"
    recommendation: "Cross-Cutting ID は Step 4 開始前に一度だけ生成し、brief・shared research・review `--id`・post-completion まで同じ値を通しで使ってください。"
  - id: "F4"
    severity: "L"
    category: "phase-gate-consistency"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:24"
    description: "Single-Spec revise の Validate 手順は `blocked` の一般 BLOCK しか定義しておらず、CLAUDE.md の phase gate が要求する `blocked_info.blocked_by` を含む明示メッセージや unknown phase の扱いが欠けています。"
    impact: "blocked spec や壊れた spec state を revise したとき、他モードと異なる曖昧な失敗になり、edge case の復旧手順が不明瞭になります。"
    recommendation: "revise の Validate でも CLAUDE.md の phase gate をそのまま適用し、`blocked` と unknown phase の応答文を統一してください。"
notes: |
  共有プロンプトに列挙された対象ファイルはすべて読み、Router、refs、CLAUDE.md、review/self-review の永続化契約を突き合わせた。
  empty roadmap、1-spec 最適化、retry exhaustion、NO-GO/SPEC-UPDATE-NEEDED の大枠フロー自体は定義されているが、上記 3 件の高優先度不整合により wave/cross-cutting 経路で実装上の破綻余地が残っている。
