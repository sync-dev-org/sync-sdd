notes: |
  全 6 件の Inspector findings ファイル (fixed 3 + dynamic 3) は全て存在し、空ファイルはなかった。

  重複判定: Flow F2 (sdd-review/SKILL.md:162) と Consistency F1 (run.md:276) は同じ wave path 不整合の検出だが、location が異なり修正対象も別ファイルであるため、個別 issue として保持した。ただし A2 の source を "inspector-flow+inspector-consistency" としてマージを反映した。

  FP 判定 6 件:
  - AskUserQuestion 2 件: MEMORY.md の既知バグ記録により FP。allowed-tools への追加は空回答バグを誘発する。
  - UNCERTAIN 3 件: Web search で公式 Claude Code ドキュメントを確認し、subagent_type / model / run_in_background の全てが Task tool の正式パラメータであることを検証。全件 FP。
  - classification 1 件: D192 の A/B 分類統一契約により FP。

  前回 Auditor (verdict-auditor.yaml) との差分:
  - 前回の A10 (tool-parameter-compliance, MEDIUM) を FP に降格。公式ドキュメントで全パラメータを検証できたため。
  - 前回の A5 (orphan-cleanup, HIGH) を A8 (LOW) に降格。state.yaml 不在は例外経路であり、通常運用では state.yaml ベースの orphan 検出が機能する。fallback のみの問題であり HIGH は過大評価。
  - 前回の Dynamic-2 F3 (engines.yaml 上書き) は D180 により FP（前回 Auditor と同一判定）。

  severity 変更の根拠:
  - orphan title 問題 (H→L): state.yaml が primary 検出手段に昇格した D164/D167 以降、title fallback は backup 経路。state.yaml を失う状況自体が例外的であり、影響範囲が限定的。

  総評: wave scope の保存先不整合 (A1-A3) と cross-cutting ID 生成順 (A4) が最も実害が大きく、仕様文書修正で収束する。state.yaml の busy slot 保持 (A5) はコード変更を伴うが自明な分岐追加。B 分類 (A8, A10) は設計方針の判断が必要。全体として CONDITIONAL — A 分類 10 件は自明修正で処理可能、B 分類 2 件はユーザー判断待ち。
