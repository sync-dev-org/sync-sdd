    reason: "FP — USER_DECISION D180 が `.sdd/settings/engines.yaml` をフレームワーク管理ファイルへ変更し、install `--update` / `--force` での上書きを明示的に採用している。"
notes: |
  全 6 件の Inspector findings ファイル（fixed 3 + dynamic 3）は存在し、空ファイルはなかったため「did not complete」はなし。

  重複判定では「同一 location かつ同一問題」の組み合わせは確認されなかった。wave path 系は複数 Inspector が同じ不整合群を別 location で検出しているため、別 issue として保持した。

  false positive は 2 件。`classification` 所見は USER_DECISION D192 と現 auditor 契約により結論が失効しており、`engines.yaml` 上書き所見は USER_DECISION D180 で明示採用済み。

  `UNCERTAIN` compliance 解消では公式 Claude Code ドキュメントを確認した。subagents / built-in `general-purpose` / foreground-background 実行の概念自体は確認できたが、`Agent(...)` 呼び出しの `subagent_type` / `model` / `run_in_background` という厳密なパラメータ名は確認できなかったため、MEDIUM 1 件として残した。
  Sources:
  - https://code.claude.com/docs/en/sub-agents
  - https://code.claude.com/docs/en/settings#tools-available-to-claude

  総評として、review-self の成果物統一方針自体は前進しているが、wave scope の保存先不整合、cross-cutting revise の ID 生成順、tmux state/title 周りの再開安全性に HIGH が残っているため GO には届かない。一方、現時点の多くは仕様文書・手順の修正で収束可能であり、ユーザー判断が必要なのは orphan fallback 方針、self-review scope 集約方針、未文書 Agent パラメータ依存の扱いに限られる。
