notes: |
  公式ドキュメントで確認できた範囲では、agent frontmatter の `model: sonnet|opus|haiku|inherit`、`tools`、`background` は妥当で、対象の `sdd-*` agent 定義はその範囲内でした。
  skills の frontmatter も `description`、`allowed-tools`、`argument-hint` の書式自体は妥当です。`settings.json` の `Skill(...)` / `Agent(...)` も、現存する skill/agent 名と一致しており、dangling entry は見当たりませんでした。
  `general-purpose` は公式に存在する built-in subagent と確認できたため、`framework/claude/skills/sdd-review/SKILL.md` と `framework/claude/skills/sdd-review-self/SKILL.md` の dispatch 先名そのものは整合しています。
  一方で、Agent ツール呼び出しにおける `subagent_type` / `model` / `run_in_background` という生パラメータ名を明示した公式記述は検索で確認できませんでした。関連仕様としては subagent の built-in 名、skill の `context: fork` / `agent`、および foreground/background の挙動までは確認済みですが、当該パラメータ名の正式 API 記法は UNCERTAIN としました。
