scope: "inspector-flow"
issues:
  - id: "F1"
    severity: "H"
    category: "dispatch-scope"
    location: "framework/claude/sdd/lib/prompts/review-self/briefer.md:23"
    summary: "Briefer が roadmap refs を shared-prompt に含めず、Router→refs 検証を完結できない"
    detail: "Briefer の FILE_LIST は `framework/claude/skills/sdd-*/SKILL.md` と `framework/claude/sdd/lib/**/*.md` は収集しますが、`framework/claude/skills/sdd-roadmap/refs/*.md` を収集しません。生成済み `active/shared-prompt.md` でも run/design/impl/revise/crud の refs が欠落しており、inspector-flow が要求する Router→refs dispatch・Wave QG・revise mode 判定を prompt 上では読めません。"
    impact: "Router がどの ref を読むか、各 ref の phase gate や revise mode 分岐が未読のまま判定され、flow review が false negative になり得ます。"
    recommendation: "Briefer の FILE_LIST に `framework/claude/skills/sdd-*/refs/*.md` を追加し、少なくとも `sdd-roadmap/refs/{design,impl,run,revise,crud}.md` を shared-prompt に常時含めてください。"
  - id: "F2"
    severity: "H"
    category: "verdict-persistence"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:163"
    summary: "self-review だけ verdicts.yaml の永続化スキーマが `batches:` を外している"
    detail: "Step 9 の例はトップレベル配列 `- seq:` を append する形ですが、verdict-format.md §4 は `batches:` 配下に batch を追加する schema です。さらに Step 3 の `max(seq values)` 取得も flat list 前提で、通常 review と互換な index 走査になっていません。"
    impact: "self-review の batch 採番、tracked/resolved 参照、将来の resume/集計処理が review 系と別実装になり、verdict persistence の一貫性が壊れます。"
    recommendation: "self-review も `batches:` ルートを前提に読み書きし、Step 3 と Step 9 を verdict-format.md §4 と同じ schema に合わせてください。"
  - id: "F3"
    severity: "M"
    category: "revise-flow"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:77"
    summary: "Single-Spec revise の review verdict handling が抽象的すぎて NO-GO/SPEC-UPDATE-NEEDED ループを実行定義できない"
    detail: "Part A Step 5 は Design Review/Impl Review の後処理を `Handle verdict per CLAUDE.md counter limits` とだけ記し、run.md の Phase Handlers が持つ再 dispatch、phase reset、archive、retry/spec_update 上限到達時の選択肢を展開していません。Cross-Cutting 側は Step 8-9 でより具体的ですが、Single-Spec 側だけ実行手順が省略されています。"
    impact: "revise の単一 spec 経路で、NO-GO や SPEC-UPDATE-NEEDED 発生時の再設計・再実装・ユーザー escalation の扱いが実装者依存になり、mode 間で挙動がずれます。"
    recommendation: "Part A に run.md Phase Handlers 相当の明示的 substeps を追加し、NO-GO/SPEC-UPDATE-NEEDED ごとの state mutation、counter 更新、上限到達時の選択肢、必要なら Cross-Cutting へ再昇格する条件を規定してください。"
  - id: "F4"
    severity: "L"
    category: "cross-check-mode"
    location: "framework/claude/skills/sdd-review/SKILL.md:166"
    summary: "`--cross-check` の standalone review は Router から到達できるが、永続化の path/type が wave cross-check と揃っていない"
    detail: "`/sdd-roadmap review design|impl --cross-check` は公開されていますが、sdd-review はその scope を `project/reviews/cross-check/` に保存し、type 正規化も `impl --wave N` にしか適用していません。verdict-format.md は cross-check を wave-scope の `project/reviews/wave-{N}/verdicts.yaml` として定義しており、standalone cross-check の保存先/種別が未定義です。"
    impact: "同じ cross-check 系 review でも参照先と batch type が分岐し、resume・集計・tracked item 再参照で見落としが出ます。"
    recommendation: "`--cross-check` を正式サポートするなら verdict-format.md に専用 scope を追加し、`--cross-check` も `type: cross-check` へ正規化してください。不要なら sdd-roadmap / sdd-review から公開引数を削除してください。"
notes: |
  生成済み `.sdd/project/reviews/self/active/shared-prompt.md` も確認したところ、今回の active prompt でも roadmap refs は未掲載でした。そのため criteria 1-8 を検証するには `framework/claude/skills/sdd-roadmap/SKILL.md` と `refs/{design,impl,run,revise,crud}.md` を追加で直接読む必要がありました。
