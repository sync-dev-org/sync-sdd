notes: |
  実行経路は `framework/claude/skills/sdd-review-self/SKILL.md` から `framework/claude/sdd/lib/prompts/...` を直接読む構成で、`framework/claude/sdd/settings/templates/review-self/` 側は同梱されているが現行 runtime では直接参照されない定義が混在している。
  今回の不整合は、主にこの二重定義が別々に進化した結果として発生している。
