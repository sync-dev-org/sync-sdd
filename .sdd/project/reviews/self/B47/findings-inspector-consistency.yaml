scope: "inspector-consistency"
issues:
  - id: "F1"
    severity: "H"
    category: "protocol-consistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:22"
    summary: "review-self の briefer は engine 解決対象として定義される一方で、実行時は常に固定 SubAgent に直結されている"
    detail: "`sdd-review-self` は Step 1-2 で `--briefer-engine/--briefer-model/--briefer-effort` を受け取り、`dispatch/engine.md` に従って briefer の engine 解決を行うよう書かれているが、Step 4 では briefer を `model: sonnet` の SubAgent として固定ディスパッチしている。`engines.yaml` の `roles.review-self.stages.briefer.start_level` も現行フローでは参照しても効かない。"
    impact: "briefer 用 override と level chain の説明が実動作と一致せず、運用者は外部 engine で briefer が走ると誤認する。設定変更や障害切り分けでも無効な経路を追うことになる。"
    recommendation: "review-self の briefer を本当に engine 解決経由で動かすか、逆に briefer を engine 解決対象から外して `argument-hint`・`engines.yaml`・関連説明を SubAgent 固定に統一する。"
  - id: "F2"
    severity: "M"
    category: "unreachable-path"
    location: "framework/claude/sdd/settings/engines.yaml:105"
    summary: "review-self の builder ステージ設定が残っているが、現行 SKILL は builder を起動せず Lead Fix に置き換わっている"
    detail: "`engines.yaml` は `roles.review-self.stages.builder.start_level` を持ち、`CLAUDE.md` でも review engine chain を briefer/inspectors/auditor/builder の 4 stage と説明している。一方、現行 `sdd-review-self/SKILL.md` の Step 2 は STAGES を `briefer, inspectors, auditor` に限定し、Step 8 は `Lead Fix` として Lead が直接修正するため builder dispatch 経路が存在しない。"
    impact: "未使用 stage が設定と説明に残り続けるため、将来の変更で builder 用 override や template を誤って再接続したり、review-self の実行経路を読み違えるリスクがある。"
    recommendation: "builder 廃止が現行仕様なら `review-self` から builder stage 設定と関連説明を削除する。builder を復活させるなら SKILL に dispatch 手順を戻し、engine 解決・template・verdict 記録を一貫させる。"
  - id: "F3"
    severity: "M"
    category: "path-consistency"
    location: "framework/claude/sdd/settings/templates/review-self/briefer.md:24"
    summary: "template 版 briefer の FILE_LIST 収集条件が lib 版より狭く、現在のフレームワーク定義ファイル群を網羅できない"
    detail: "template 版 briefer は `framework/claude/skills/sdd-*/refs/*.md` と `framework/claude/sdd/settings/rules/*.md` だけを収集し、`framework/claude/skills/sdd-*/references/*.md`、`framework/claude/sdd/settings/rules/**/*.md`、`framework/claude/sdd/settings/engines.yaml`、`framework/claude/sdd/lib/**/*.md` を外している。実行系の lib 版 briefer はこれらを対象に含めており、同じ review-self 用 briefer として定義が一致していない。"
    impact: "template 経路が使われた場合、Inspector は現行仕様で必須の参照ファイルを shared prompt に受け取れず、『shared prompt に列挙された全ファイルを読む』という前提自体が壊れる。"
    recommendation: "template 版 briefer の FILE_LIST を lib 版と同一にそろえるか、shared prompt 構築を単一ソース (`shared-prompt-structure.md`) に寄せて二重管理をやめる。"
  - id: "F4"
    severity: "M"
    category: "protocol-consistency"
    location: "framework/claude/sdd/settings/templates/review-self/briefer.md:76"
    summary: "template 版 briefer の compliance cache 手順が verdicts.yaml の現行スキーマと食い違っている"
    detail: "template 版 briefer は `.sdd/project/reviews/self/verdicts.yaml` から `batches[].seq` と `batches[].date` を読む前提だが、現行 `sdd-review-self/SKILL.md` Step 9 が示す `verdicts.yaml` はトップレベル配列の batch エントリ (`- seq: ...`) であり、`batches` キーを持たない。"
    impact: "template の cache 再利用手順は現行の verdict 永続化形式ではそのまま実装できず、compliance cache が常時 miss するか、別の非公開変換処理を暗黙前提にしてしまう。"
    recommendation: "cache 手順を現行 `verdicts.yaml` スキーマに合わせて書き直すか、schema が確定するまで cache 手順自体を削除して実フローと一致させる。"
  - id: "F5"
    severity: "L"
    category: "schema-consistency"
    location: "framework/claude/sdd/settings/templates/review-self/inspector-consistency.md:18"
    summary: "template 版 inspector-consistency は xrefs を要求しながら、出力スキーマに `xrefs` セクションを定義していない"
    detail: "lib 版 `inspector-consistency.md` は `xrefs:` 配列と許容 status 値を明示しているが、template 版は『Include a cross-reference matrix.』とだけ書き、YAML 例から `xrefs` を落としている。"
    impact: "template から生成した prompt を使うと、Lead/Auditor が期待する cross-reference 行列の形が実装者依存になり、出力の比較・自動検証が不安定になる。"
    recommendation: "template 版にも lib 版と同じ `xrefs` スキーマと status 定義を入れるか、固定 Inspector prompt は lib 版を唯一の正本にする。"
