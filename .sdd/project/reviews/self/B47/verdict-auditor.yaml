notes: |
  今回の self-review は D227 (sdd-review-self 改修計画) の実装直後スナップショット。lib/ 移行が進行中のため、
  template 系の stale issues の多くは D227/I33 で追跡済みの deferred 作業として FP 処理した。

  H-level 3 件の性質:
  - A1 (H, A): Briefer refs/ 欠落 — glob 1 行追加で即修正可能
  - A2 (H, B): verdicts.yaml batches: スキーマ不整合 — review/self-review 統一スキーマの設計判断が必要
  - A3 (H, A): briefer engine dead code — D227 決定に基づく cleanup、コード削除のみ

  最大の懸念は A2。self-review と通常 review の verdicts.yaml 互換性が未解決のまま、
  self-review の verdict tracking が review と異なる実装になるリスクがある。
  A1/A3/A4/A5/A7 は auto-fix (A 分類) で一括処理可能。
  A6/A9 は設計判断 (B 分類) が必要。
