scope: "inspector-dynamic-3-review-flow-order"
issues:
  - id: "F1"
    severity: "H"
    category: "logic-inconsistency"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:279"
    summary: "Dead-Code NO-GO の「再レビューなし」と「最大3リトライ」が矛盾"
    detail: "run.md Step 8a の NO-GO 処理に `No re-review loop — Builder fixes once, then proceed to cross-check` と `Max 3 retries` が同時に記述されている。再レビューループなし（Builder fix 後に dead-code レビューを再実行せず cross-check へ進む）であればリトライカウントが2以上になる機会がない。一方 CLAUDE.md §Auto-Fix Counter Limits では `Dead-Code Review NO-GO: max 3 retries` と記載しており、dead-code レビュー自体の再実行を前提としている。両者の意図が食い違っている。"
    impact: "Lead が Dead-Code NO-GO を処理する際、Builder fix 後に dead-code レビューを再実行すべきか否かの判断が分かれる。再レビューなしで cross-check に進む場合、dead-code 固有の修正検証が行われず修正漏れが検出されないリスクがある。再レビューありなら `No re-review loop` の記述が誤解を招く。"
    recommendation: "意図を明確化し統一する。(A) 再レビューありの場合: `No re-review loop` を削除し `NO-GO → Builder fix → dead-code re-review (max 3 retries)` と書き直す。(B) 再レビューなしの場合: `Max 3 retries` を削除し、CLAUDE.md の dead-code retry exception も削除する。"
  - id: "F2"
    severity: "H"
    category: "wave-qg-persistence"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:283"
    summary: "wave cross-check を `/sdd-review impl --wave N` で実行するが永続化 type が cross-check に正規化されない"
    detail: "run.md Step 8b は Wave QG の cross-check を `/sdd-review impl --wave {N}` で実行する。verdict-format.md §4 の Wave-Specific Fields は `type: \"cross-check\"` を示しているが、sdd-review SKILL.md の引数解釈では `--wave N` は `REVIEW_TYPE=impl` のままで、Step 9 の永続化も `type: \"{review-type}\"` をそのまま使う。結果として同じ `wave-{N}/verdicts.yaml` 内の dead-code batch と cross-check batch の両方が `type: impl` で記録される可能性がある。"
    impact: "wave 再開時や既解決 issue の参照時に dead-code batch と cross-check batch を type で一意に判別できず、skip 条件・resolved 判定・再試行対象 spec の特定が不安定になる。"
    recommendation: "sdd-review SKILL.md の Step 9 で `impl --wave N` の場合は `type: \"cross-check\"` に正規化する旨を明記する。あわせて run.md Step 8b のヘッダー表記もこの正規化後の type を参照するよう修正する。"
  - id: "F3"
    severity: "M"
    category: "schema-inconsistency"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:276"
    summary: "verdicts.yaml 永続化記述がレガシー markdown ヘッダー形式を使用"
    detail: "run.md Step 8a (L276) で `(header: [W{wave}-DC-B{seq}])`、Step 8b (L283) で `(header: [W{wave}-B{seq}])` と記述している。verdict-format.md §4 Verdict Index は YAML スキーマ（batches リストに seq/type/scope/wave フィールドを持つエントリを append）を定義しており、sdd-review SKILL.md Step 9 もこの YAML スキーマに準拠している。`header:` という表現は旧 verdicts.md（markdown）時代の残骸。"
    impact: "Lead が run.md を参照して Wave QG verdict を永続化する際に YAML batches スキーマとの間で混乱する可能性がある。実際の永続化は sdd-review に委譲されるため実行上の影響は限定的だが、ドキュメント間の一貫性が損なわれている。"
    recommendation: "run.md L276 を `Persist verdict to verdicts.yaml (type: \"dead-code\", scope: \"wave-{wave}\", wave: {wave})` に、L283 を `Persist verdict to verdicts.yaml (type: \"cross-check\", scope: \"wave-{wave}\", wave: {wave})` に修正し、verdict-format.md §4 の YAML スキーマと整合させる。"
  - id: "F4"
    severity: "M"
    category: "blocked-branch"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:272"
    summary: "all specs blocked 分岐で Post-gate のカウンタ一括リセットが不適切に適用される"
    detail: "all specs blocked の場合は Dead-Code/Cross-Check をスキップして Post-gate に進むと記述されているが、Post-gate (L294) では wave 内全 spec の retry_count と spec_update_count を無条件で 0 にリセットする。Blocking Protocol (Step 7) は reset を fix/skip 等の user resolution 後に行う前提。all-blocked 分岐では ESCALATION_RESOLVED も upstream 解消もないままカウンタが消える。"
    impact: "次回 resume 時に、既に上限到達で停止していた spec のカウンタが未消化扱いに戻り、同じ自動再試行を繰り返す危険がある。"
    recommendation: "all-blocked 時は Post-gate のカウンタ一括リセットを適用せず、Blocking Protocol の user decision 待ち状態を保持する。または reset 対象を implementation-complete 到達 spec のみに限定する条件を追加する。"
  - id: "F5"
    severity: "M"
    category: "step-reference"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:148"
    summary: "Review Decomposition の AUDITOR-COMPLETE が sdd-review の Step 番号を誤参照"
    detail: "run.md の AUDITOR-COMPLETE で `Execute sdd-review Step 8 (read verdict, persist to verdicts.yaml, archive active → B{seq})` と記述しているが、sdd-review SKILL.md では Step 8 は Lead supervision + user presentation であり、verdicts.yaml への永続化と archive は Step 9 の役割。"
    impact: "dispatch loop の実装者が run.md だけを根拠にすると、verdict persist 前に次 phase へ進める解釈になりやすく、review_state の終了条件がぶれる。"
    recommendation: "run.md の Step 参照を `Execute sdd-review Steps 8-9 (Lead supervision, verdict persist to verdicts.yaml, archive active → B{seq})` に修正する。"
  - id: "F6"
    severity: "L"
    category: "cross-reference"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:163"
    summary: "Readiness Rules の Implementation 条件で verdicts.yaml の type フィルタリングが未指定"
    detail: "Readiness Rules の Implementation 行に `Design Review verdict is GO/CONDITIONAL (check verdicts.yaml latest batch on resume)` と記載されているが、per-feature の verdicts.yaml には design と impl の両 type の batch が追記される。type フィルタリング（design batch のみを対象とする）の必要性が明示されていない。revision フロー等で impl batch が既に存在する場合、latest batch が impl 型であれば design verdict の確認にならない。"
    impact: "セッション再開時に verdicts.yaml の最終バッチを単純に取得すると、type が design でないバッチを誤参照する可能性がある。通常フローでは発生しにくいが revision フローでリスクが顕在化する。"
    recommendation: "`check verdicts.yaml latest batch where type=\"design\" on resume` のように type フィルタリングを明示する。"
notes: |
  調査の焦点4項目に対する総合所見:
  1. run.md の Dead-Code 先行化順序は sdd-review SKILL.md と整合している。sdd-review は個別レビューパイプラインを担当し、順序制御は run.md が担当するという責務分離は明確。
  2. all-blocked スキップ分岐（run.md Step 8 冒頭）は dead-code と cross-check の両方をスキップする旨が明記されており、分岐自体は一貫している。ただしカウンタリセットの適用範囲に問題がある (F4)。
  3. NO-GO/SPEC-UPDATE-NEEDED の回数上限・リセット条件は CLAUDE.md と run.md で概ね一致しているが、Dead-Code の再レビュー有無に根本的矛盾がある (F1)。
  4. verdicts.yaml の参照先は type フィルタリングの欠如 (F6) と cross-check type 正規化の欠如 (F2) が再開時のステータス判断ロジックに影響する。
  sdd-conventions-scanner.md は review flow order とは直接関係なく、問題は検出されなかった。
