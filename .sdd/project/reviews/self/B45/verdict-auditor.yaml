    detail: "refs/run.md は Wave QG の dead-code NO-GO で「dispatch Builder(s) directly with fix instructions (Builder scope = all files from Inspector findings)」と指示するが、sdd-builder は feature 名・group ID・tasks.yaml・design.md・file scope を前提に動作する。dead-code 所見は wave 横断・タスク非依存で発生し得るため、この分岐だけでは Builder 入力を構成できない。"
    impact: "dead-code NO-GO 時の auto-fix loop が sdd-builder の契約を満たせず、Wave QG が停止するか曖昧な修正に流れる恐れがある。"
