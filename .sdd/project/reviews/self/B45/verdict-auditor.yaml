    summary: "verdicts.yaml 永続化記述でレガシー角括弧ヘッダー記法が残留"
    detail: "run.md Step 8a で (header: [W{wave}-DC-B{seq}])、Step 8b で (header: [W{wave}-B{seq}]) と記述。verdict-format.md §4 は YAML batches リスト形式 (seq/type/scope/wave フィールド) を定義しており、角括弧ヘッダーは旧 verdicts.md (Markdown) 時代の残骸。sdd-review SKILL.md Step 9 は既に YAML スキーマ準拠済み。"
    impact: "Lead が run.md を根拠に Wave QG verdict を永続化する際、YAML batches スキーマとの間で混乱が生じる。実行は sdd-review 委譲のため直接破損は起きないが、ドキュメント間不整合が Lead の判断を不安定にする。"
    recommendation: "run.md L276 を 'Persist verdict to verdicts.yaml (type: \"dead-code\", scope: \"wave-{wave}\", wave: {wave})' に、L283 を 'Persist verdict to verdicts.yaml (type: \"cross-check\", scope: \"wave-{wave}\", wave: {wave})' に修正し verdict-format.md §4 と整合させる。"
