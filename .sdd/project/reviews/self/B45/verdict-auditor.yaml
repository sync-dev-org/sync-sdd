    severity: "H"
    category: "wave-qg-persistence"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:283"
    summary: "wave cross-check を /sdd-review impl --wave N で実行するが永続化 type が cross-check に正規化されない"
    detail: "run.md Step 8b は Wave QG cross-check を `/sdd-review impl --wave {N}` で実行する。verdict-format.md §4 は `type: \"cross-check\"` を示しているが、sdd-review SKILL.md は `--wave N` 付きでも REVIEW_TYPE=impl のままで、Step 9 の永続化も `type: \"{review-type}\"` をそのまま使う。結果として dead-code batch と cross-check batch が両方 `type: impl` で記録される可能性がある。"
    impact: "wave 再開時や既解決 issue の参照時に dead-code batch と cross-check batch を type で一意に判別できず、skip 条件・resolved 判定・再試行対象 spec の特定が不安定になる。"
    recommendation: "sdd-review SKILL.md の Step 9 で `impl --wave N` の場合は `type: \"cross-check\"` に正規化する旨を明記する。あわせて run.md Step 8b のヘッダー表記もこの正規化後の type を参照するよう修正する。"
