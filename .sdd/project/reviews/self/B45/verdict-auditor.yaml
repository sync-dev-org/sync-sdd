  - id: "A8"
    source: "inspector-dynamic-3-review-flow-order"
    severity: "H"
    category: "logic-inconsistency"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:279"
    summary: "Dead-Code NO-GO の「再レビューなし」と「最大3リトライ」が矛盾"
    detail: "run.md Step 8a の NO-GO 処理に `No re-review loop — Builder fixes once, then proceed to cross-check` と `Max 3 retries` が同時に記述されている。再レビューループなしならリトライカウントが2以上になる機会がない。一方 CLAUDE.md §Auto-Fix Counter Limits では `Dead-Code Review NO-GO: max 3 retries` と記載しており dead-code レビュー自体の再実行を前提としている。"
    impact: "Lead が Dead-Code NO-GO を処理する際、Builder fix 後に dead-code レビューを再実行すべきか否かの判断が分かれる。再レビューなしの場合、修正検証が行われず修正漏れが検出されないリスクがある。"
    recommendation: "意図を明確化し統一する。(A) 再レビューあり: `No re-review loop` を削除し `NO-GO → Builder fix → dead-code re-review (max 3 retries)` と書き直す。(B) 再レビューなし: `Max 3 retries` を削除し、CLAUDE.md の dead-code retry exception も削除する。"
    classification: "B"

