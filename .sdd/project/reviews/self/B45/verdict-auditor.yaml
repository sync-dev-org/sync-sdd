    detail: "Step 7d の再利用条件は grid-check.sh exit 0 (全 slot 生存) かつ全 slot が status: idle であることを要求する。しかし Step 7e では「grid 再利用時: 既存 state.yaml の grid セクションから busy slot の metadata (agent, engine, channel) を保持し」と記述している。全 slot が idle でなければ再利用に入らないため、busy slot の metadata を保持する分岐は到達不能なデッドロジック。"
    impact: "現時点では実害はないが、Step 7e の記述が保持ロジックの存在を暗示するため将来の開発者が再利用条件を誤解する。また Pattern A のサーバー再利用シナリオが sdd-start の再利用条件によって暗黙にブロックされている。"
    recommendation: "(a) busy slot を含む grid の再利用を意図しないなら Step 7e の busy slot metadata 保持記述を削除し簡素化する。(b) Pattern A サーバー再利用を意図するなら Step 7d の再利用条件を「全 slot 生存」のみに緩和し busy slot を保持しつつ再利用可能にする。"
    classification: "B"

