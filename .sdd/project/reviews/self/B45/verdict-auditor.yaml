notes: |
  ## 総合所見

  フレームワークのランタイムコード (SKILL, agents, templates, rules) は全体として well-structured であり、通常オペレーションは機能する。
  全コンプライアンス項目 (inspector-compliance) が OK を示している点は肯定的。

  ただし以下の領域に集中的な問題がある:

  **最重要 (即時対応推奨):**
  1. install.sh の v2.6.0 移行ロジック (A5/A6/A7/A21/A22) — v2.5.x からアップグレードするユーザーの
     handover/knowledge/decisions データが失われるか誤変換される。実ユーザー影響が最も高い。
  2. YAML テンプレートの summary/detail 同一行問題 (A4) — 外部エンジン (Codex/Gemini) が
     生成する findings YAML の品質を直接低下させる。review pipeline 全体に波及する。
  3. Dead-Code NO-GO の再レビュー有無矛盾 (A8) と CLAUDE.md の矛盾 — Lead の判断を誤らせる。

  **ユーザー判断が必要な設計決定 (B分類 8件):**
  - A3: Wave dead-code NO-GO の Builder 修正方式 (fix-mode vs Lead 直接実行)
  - A8: Dead-Code NO-GO の再レビューあり/なし方針 (run.md か CLAUDE.md を正として更新)
  - A10: Review の standalone vs dispatch-loop の二重パスを明示するかアーキテクチャ変更するか
  - A11: wave dead-code の --wave N 引数化 (3ファイル横断修正が必要)
  - A12: revise モード検出の曖昧性解消 (確認 vs フラグ追加)
  - A16: decisions.yaml の append-only 統一 vs controlled rewrite 例外を CLAUDE.md に記載
  - A23: all-blocked 時のカウンタリセット適用範囲
  - A25: grid 再利用時の busy slot 保持設計 (option a: 削除 / option b: 条件緩和)

  **自動修正可能 (A分類 32件):**
  run.md のレガシー記法更新、YAML テンプレート修正、install.sh 移行ロジック補完、
  step 番号修正、ファイルパス修正等。いずれも修正箇所が明確で一意な正解がある。
