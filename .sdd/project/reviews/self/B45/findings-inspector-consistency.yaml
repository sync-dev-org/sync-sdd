  | Verdict 値 (GO/CONDITIONAL/NO-GO/SPEC-UPDATE-NEEDED) | CLAUDE.md:24 | sdd-review, run.md, verdict-format.md | OK (self は意図的サブセット) |
  | Severity コード (C/H/M/L) | verdict-format.md:55 | 全テンプレート | OK |
  | Counter limits (retry:5, spec_update:2, aggregate:6) | CLAUDE.md:180 | run.md, revise.md | OK |
  | Dead-code retry limit (max 3) | CLAUDE.md:181 | run.md Step 8a | OK |
  | Agent 名 (5 agents) | CLAUDE.md:30-32 | agents/*.md, settings.json | OK |
  | general-purpose (built-in) | dispatch patterns | ファイルなし | OK (意図的) |
  | Session files | CLAUDE.md:220-226 | sdd-start, sdd-handover | OK (session/decisions/ 欠落 = F2) |
  | Level chain (L0-L6) | CLAUDE.md:388-396 | engines.yaml, sdd-review, sdd-review-self | OK |
  | Timeout defaults (review:1200, review-self:900) | sdd-review, sdd-review-self | engines.yaml | OK |
  | Findings filename convention | verdict-format.md:9 | review templates | NG (review templates diverge) |
  | decisions.yaml persistence | CLAUDE.md:223 | sdd-handover Step 4b | NG (F2 参照) |
  | Archive path notation | CLAUDE.md:36 | sdd-review, sdd-review-self | Partial (F7 参照) |
  | YAML output schema | verdict-format.md §1 | self-review templates, shared-prompt | NG (F1: summary/detail same line) |
  | settings.json entries | settings.json | agents/*.md, skills/sdd-*/SKILL.md | OK (全 5 Agent + 10 Skill が一致) |
  | install.sh path mapping | install.sh | CLAUDE.md Paths, template dirs | OK |
  | Steering files (product/tech/structure) | CLAUDE.md:407 | sdd-steering, templates/steering/ | OK |
  | Verdicts persistence schema | verdict-format.md §4 | sdd-review Step 9, sdd-review-self Step 9a | OK |
  | Review scope directories | sdd-review Step 4 | verdict-format.md §4 | OK |
  | Conventions brief path | run.md Step 3 | sdd-conventions-scanner, impl.md | OK |
  | Builder report path | impl.md Step 4 | sdd-builder agent | OK |
  | Analyst report path | CLAUDE.md:41 | sdd-analyst agent, reboot.md Phase 4 | OK |

  循環参照: 検出されず。ファイル間参照は CLAUDE.md → Skills → refs → templates → rules の方向で健全。
  未到達パス: Phase transitions は全パスが正常に遷移可能。blocked → unblock (run.md Step 7) も到達可能。
