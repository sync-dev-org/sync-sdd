scope: "inspector-dynamic-2-session-migration"
issues:
  - id: "F1"
    severity: "H"
    category: "migration-condition"
    location: "install.sh:413"
    summary: "v2.6.0移行が `.sdd/handover` 存在時にしか走らず、旧 `.sdd/state.yaml` 単独残存ケースを取りこぼす"
    detail: "v2.6.0移行ブロックは `if [ -d \".sdd/handover\" ]; then` の内側でしか `mv .sdd/state.yaml .sdd/session/state.yaml` を実行しない (L419)。旧環境で `.sdd/handover` が既に削除済みまたは手動整理されていて `.sdd/state.yaml` だけが残っている場合、インストール後も state ファイルが旧位置に残留する。"
    impact: "`/sdd-review` と `/sdd-review-self` は `session/state.yaml` 前提で grid/SID を復元するため、移行漏れ時は tmux 再利用・orphan 検出・sticky escalation level 継続が効かず、毎回 background fallback に落ちる。"
    recommendation: "`.sdd/state.yaml` の移動を `if [ -d .sdd/handover ]` ブロックの外側に独立分岐として配置する: `[ -f .sdd/state.yaml ] && mkdir -p .sdd/session && mv .sdd/state.yaml .sdd/session/state.yaml`"
  - id: "F2"
    severity: "H"
    category: "migration-data-loss"
    location: "install.sh:416"
    summary: "v2.6.0移行で decisions.md を session/decisions.md にリネームするが、フレームワークは session/decisions.yaml を期待する"
    detail: "L416 は `decisions.md` → `session/decisions.md` に mv するが、フレームワーク全体 (sdd-start Step 4, sdd-handover Step 4b, sdd-review-self auditor テンプレート) は `session/decisions.yaml` を参照する。移行後に session/decisions.md が orphan ファイルとして残り、sdd-start は decisions.yaml 不在として新規作成する。v2.5.0 (D202 コミット) で decisions の YAML 移行が行われたため、v2.5.x ユーザーは handover/decisions.yaml を持つが、このケースもカバーされていない。"
    impact: "v2.5.x 以前からのアップグレードユーザーの決定履歴が事実上失われる。SESSION_START が D1 から再開され、過去の意思決定トレーサビリティが断絶する。"
    recommendation: "(1) v2.5.x ユーザー対応: `[ -f .sdd/handover/decisions.yaml ] && mv .sdd/handover/decisions.yaml .sdd/session/decisions.yaml` を追加。(2) v2.5.0 以前ユーザー対応: `decisions.md` は Markdown 自由形式のため YAML として不正。mv 先を `session/decisions.md` のままにし、旧フォーマットは手動変換用にアーカイブとして残す。または `session/decisions-legacy.md` にリネーム。decisions.yaml は新規テンプレートから生成する。"
  - id: "F3"
    severity: "H"
    category: "migration-data-loss"
    location: "install.sh:417"
    summary: "buffer.md → knowledge.yaml の拡張子変更でフォーマット変換なし + v2.5.x の knowledge.yaml ケースが未処理"
    detail: "(1) 旧 `buffer.md` は Markdown 自由形式。`knowledge.yaml` は `entries: []` を持つ構造化 YAML を期待する。単純 mv では YAML パースエラーが発生する。(2) v2.5.0 以降のユーザーが `handover/knowledge.yaml` を持つケースがチェックされておらず、移行漏れになる。"
    impact: "buffer.md に既存内容がある場合、knowledge.yaml として不正な形式になり、Builder/Lead の knowledge 追記や sdd-handover の consolidation でエラーが発生する。v2.5.x ユーザーの knowledge.yaml は handover/ に取り残される。"
    recommendation: "(1) `[ -f .sdd/handover/knowledge.yaml ] && mv .sdd/handover/knowledge.yaml .sdd/session/knowledge.yaml` を追加し、buffer.md より優先する。(2) buffer.md は `session/knowledge-legacy.md` にアーカイブし、knowledge.yaml は新規テンプレートから生成する。"
  - id: "F4"
    severity: "M"
    category: "migration-incomplete"
    location: "install.sh:415"
    summary: "v2.6.0移行が handover.md (v2.5.0 リネーム後) のケースを処理しない"
    detail: "v2.5.0 で session.md → handover.md にリネームされた。v2.6.0 移行は `handover/session.md` のみをチェックし (L415)、`handover/handover.md` をチェックしない。v2.5.x ユーザーは `handover/handover.md` を持つが、session/ に移行されない。"
    impact: "v2.5.x ユーザーの handover.md が handover/ に取り残され、sdd-start が session/handover.md 不在として初回セッション扱いになる。直前のセッション状態と継続コンテキストが失われる。"
    recommendation: "L415 の後に `[ -f .sdd/handover/handover.md ] && mv .sdd/handover/handover.md .sdd/session/handover.md` を追加する。session.md と handover.md の両方が存在するケースは考えにくいが、handover.md を優先する。"
  - id: "F5"
    severity: "M"
    category: "migration-incomplete"
    location: "install.sh:418"
    summary: "sessions/ → handovers/ リネーム (v2.5.0) が v2.6.0 移行に反映されていない"
    detail: "v2.5.0 で `sessions/` が `handovers/` にリネームされた。v2.6.0 移行は `handover/sessions` (L418) のみをチェックし、`handover/handovers` をチェックしない。v2.5.x ユーザーのアーカイブディレクトリが移行されない。"
    impact: "アーカイブの欠落はランタイム動作に影響しない (参照先ではない) が、handover/ ディレクトリが空にならず rmdir が失敗し、孤立ディレクトリが残る。"
    recommendation: "`[ -d .sdd/handover/handovers ] && mv .sdd/handover/handovers .sdd/session/handovers` を L418 の後に追加する。"
  - id: "F6"
    severity: "L"
    category: "state-lifecycle"
    location: "framework/claude/skills/sdd-start/SKILL.md:16-17"
    summary: "初回セッションでは handover.md 不在を理由に Step 8 へスキップするが、tmux 初期化 (Step 7) も飛ばされる"
    detail: "sdd-start は `session/handover.md` がない初回セッションで Step 8 にスキップする一方、tmux 初期化と `session/state.yaml` 生成は Step 7 にある。初回セッション中に `/sdd-review` や `/sdd-review-self` を起動すると、`session/state.yaml` 不在として background fallback に落ちる。"
    impact: "データ破損は起きないが、初回セッションで grid 再利用・pane 再割当が効かず tmux 実行経路が異なる。移行直後の最初の run/review で挙動差が出る。"
    recommendation: "handover.md の有無に関係なく `$TMUX` がある場合は Step 7 を実行するよう、スキップ先を Step 7 に変更する (`Absent → first session: skip to Step 7`)。"
  - id: "F7"
    severity: "L"
    category: "consistency-positive"
    location: "framework/claude/ (全ファイル)"
    summary: "フレームワークランタイムコード内で session/ パス参照は完全に統一されている"
    detail: "CLAUDE.md, sdd-start, sdd-handover, sdd-review, sdd-review-self, sdd-roadmap (SKILL.md + refs/), tmux-integration.md, engines.yaml, auditor テンプレート, inspector-brief テンプレートの全ファイルで `session/decisions.yaml`, `session/knowledge.yaml`, `session/state.yaml`, `session/handover.md` への参照が一貫している。旧パス (`handover/decisions`, `handover/knowledge`, `handover/state`, `decisions.md`, `buffer.md`, `.sdd/state.yaml`) の残存参照はフレームワークランタイムコード内に存在しない。"
    impact: "移行後のランタイム動作に旧パス参照による不整合リスクはない。問題は install.sh の移行ロジックのみに集中している。"
    recommendation: "ランタイム側は修正不要。install.sh の v2.6.0 移行ブロック (F1-F5) の修正のみが必要。"
notes: |
  調査範囲: install.sh, framework/claude/CLAUDE.md, framework/claude/skills/sdd-{start,handover,review,review-self,roadmap,steering,reboot}/SKILL.md (+ refs/), framework/claude/agents/sdd-*.md, framework/claude/sdd/settings/rules/tmux-integration.md, framework/claude/sdd/settings/engines.yaml, framework/claude/sdd/settings/templates/{review,review-self,session}/*.

  全体的な評価: フレームワークのランタイムコード (SKILL, agents, templates, rules) における session/ パス参照は完全に統一されており、Investigation Focus 2・3 は合格。問題は install.sh の v2.6.0 移行ブロック (Investigation Focus 1) に集中しており、v2.5.0 (D202 コミット) で実施されたファイル名変更 (session.md→handover.md, decisions.md→decisions.yaml, buffer.md→knowledge.yaml, sessions/→handovers/) が v2.6.0 移行に反映されていない。Investigation Focus 4 (state.yaml の上書き・再利用ロジック) は sdd-start Step 7 の grid-check → 再利用/新規作成分岐が適切に設計されており、run 再開時の SID/window 破損リスクは確認されなかった (F1 の条件分岐問題を除く)。
