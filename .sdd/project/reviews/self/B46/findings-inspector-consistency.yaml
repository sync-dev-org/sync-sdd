notes: |
  レビュー対象: framework/ 以下の全 SKILL.md, agent .md, rules, templates, settings.json, install.sh。

  全体的な整合性は良好。phase 名 (initialized/design-generated/implementation-complete/blocked)、
  verdict 値 (GO/CONDITIONAL/NO-GO/SPEC-UPDATE-NEEDED)、severity コード (C/H/M/L) は
  全ファイル間で統一されている。

  主要な問題点は以下:
  1. tmux-integration.md の step 番号参照が sdd-start.md の実際の構造と乖離 (Step 7 → Step 6)
  2. sdd-review-self の codex コマンドが stdin indicator (-) を欠く (sdd-review との不一致)
  3. self-review Auditor が classification フィールドを verdict-auditor.yaml に含める
     (verdict-format.md では Lead 専任フィールド)
  4. sdd-publish-setup の name フィールド欠落と sdd-forge-skill の allowed-tools 欠落
  5. settings.json に Agent(general-purpose) が未登録

  Auto-Fix Counter Limits (retry_count:5, spec_update_count:2, aggregate:6)、
  SubAgent の run_in_background:true 原則、file-based communication プロトコルは
  CLAUDE.md と各 SKILL.md/agent .md で一貫して記述されている。

  sdd-builder.md の tasks-generation.md 参照は xrefs で MISSING_RELATIVE_TARGET とマークしたが、
  これはビルダーが `{{SDD_DIR}}/settings/rules/agent/tasks-generation.md` (インストール先) を
  参照しているため。framework/ パスではなくインストール後のパスを使うのは仕様通りであり、
  実運用上の問題ではない。
