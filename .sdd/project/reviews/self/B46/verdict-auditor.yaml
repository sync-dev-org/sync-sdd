    recommendation: |
      `rules/*.md` を `rules/**/*.md` に変更する。
      または、D222 の方針に従い、このテンプレートファイル自体を削除（dead artifact）。
      参照元の references/briefer.md:32 は既に `**/*.md` を使用しており整合している。
    classification: "A"

  - id: "A11"
    source: "inspector-dynamic-3"
    severity: "M"
    category: "stale-artifact"
    location: "framework/claude/sdd/settings/templates/review-self/briefer.md:26"
    summary: "テンプレート briefer.md のスキルサブディレクトリ名が refs → references に未更新"
    detail: |
      同ファイル Step 2 のグロブに `framework/claude/skills/sdd-*/refs/*.md` が残存。
      現在のフレームワークでは `refs/` は `references/` にリネーム済みで `refs/` は存在しない。
      参照元の references/briefer.md:29 は既に `references/*.md` を使用している。
    impact: "このテンプレートが使われた場合、references/ 配下のドキュメントが FILE_LIST に含まれない。"
    recommendation: "`refs/*.md` を `references/*.md` に変更する。"
    classification: "A"

  - id: "A12"
    source: "inspector-dynamic-3+inspector-dynamic-4"
    severity: "M"
    category: "install-artifact-leak"
    location: "framework/claude/skills/sdd-review-self/SKILL.md.bak1"
    summary: "SKILL.md.bak1 がリポジトリに残留し install.sh でユーザー環境にコピーされる"
    detail: |
      install.sh の install_dir 関数は `find "$src_dir" -type f` で全ファイルを列挙するため、
      SKILL.md.bak1 も対象となり `.claude/skills/sdd-review-self/SKILL.md.bak1` として
      ユーザー環境にインストールされる。ファイルには旧式の破損パス参照も含む。
      （Dynamic3-F3 + Dynamic4-F3 を統合した finding）
    impact: |
      バックアップファイルがユーザー環境に配布される。skills ディレクトリを走査するツールが
      誤ってロードするリスク。開発者が誤って旧参照を復帰させるリスクもある。
      リリース前に対処が必要（Dynamic4 が「最優先対応」として指摘）。
    recommendation: |
      `framework/claude/skills/sdd-review-self/SKILL.md.bak1` を削除する。
      バックアップが必要な場合は git 履歴を利用する。（推奨アクション: A）
      代替: install.sh の install_dir を `find "$src_dir" -type f -not -name "*.bak*"` に変更。
    classification: "A"

  - id: "A13"
    source: "inspector-dynamic-4"
    severity: "M"
    category: "instruction-completeness"
    location: "framework/claude/skills/sdd-review-self/references/briefer.md:73-76"
    summary: "briefer.md Step 4 の fill-in 指示に {HEURISTICS_CONTENT} プレースホルダーが未記載"
    detail: |
      briefer.md Step 4 は「filling in FILE_LIST and deny_patterns」と 2 項目のみ列挙。
      しかし shared-prompt-structure.md には {HEURISTICS_CONTENT} も存在し、
      Step 3b で bash-security-heuristics.md を収集しているにもかかわらず fill-in 指示に含まれない。
    impact: |
      エンジンが HEURISTICS_CONTENT をリテラル文字列として残した場合、
      Inspector へのヒューリスティクス情報伝達が失敗し、意図的パターンを FP としてレポートする。
    recommendation: |
      Step 4 を更新して 3 項目を明示する:
      「filling in: {FILE_LIST} from Step 2, {HEURISTICS_CONTENT} from Step 3b,
      {deny_patterns} from Step 3」
    classification: "A"

  - id: "A14"
    source: "inspector-dynamic-4"
    severity: "M"
    category: "schema-inconsistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:206-227"
    summary: "SKILL.md Step 9 の verdicts.yaml サンプルに batches: ラッパーキーが欠落"
    detail: |
      Step 9 のサンプルはリストアイテム（`- seq: {B_SEQ} ...`）のみを示しており、
      トップレベルの `batches:` キーが記載されていない。一方 verdict-format.md §4 は
      `batches:` をトップレベルキーとして定義しており、Step 3 も `batches[].seq` を参照している。
    impact: |
      Lead が Step 9 の形式をそのまま適用すると verdicts.yaml を batches: なしのベアリストとして
      作成する可能性があり、Step 3 の max(batches[].seq)+1 計算が失敗しシーケンスが常に 1 になる。
    recommendation: |
      Step 9 のサンプルを以下のように修正:
        batches:
          - seq: {B_SEQ}
            type: "self"
            scope: "framework"
            ...
    classification: "A"

  # ── LOW ───────────────────────────────────────────────────────────────────
  - id: "A15"
    source: "inspector-flow"
    severity: "L"
    category: "counter-management"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:74"
    summary: "fast-track spec のパイプライン完了時にカウンタリセットが定義されていない"
    detail: |
      Island Spec（Wave Bypass）は Wave QG の post-gate（Step 8c）カウンタリセットを受けない。
      CLAUDE.md のリセットトリガー（wave completion / user escalation / revise start）のいずれにも
      fast-track 個別完了が該当しないため、カウンタが非ゼロのまま残る可能性がある。
    impact: "実害は限定的（revise 開始時にリセットされる）。sdd-status 表示が不正確になる可能性。"
    recommendation: |
      run.md Step 4 Fast-track に追記:
      「After full pipeline completion and commit: reset retry_count=0 and
      spec_update_count=0 for the fast-track spec.」
    classification: "A"

  - id: "A16"
    source: "inspector-flow"
    severity: "L"
    category: "documentation-clarity"
    location: "framework/claude/skills/sdd-roadmap/refs/impl.md:75"
    summary: "Pilot Stagger の dispatch 指示に「normally」が残存し foreground 誤解を招く"
    detail: |
      Step 4 §Pilot Stagger Protocol Step 2:「Dispatch pilot Builder group normally. Wait for completion.」
      「normally」は CLAUDE.md の「run_in_background: true always. No exceptions」と齟齬がある。
    impact: "「normally = foreground OK」と解釈した場合、ユーザーターミナルをブロックする規約違反が発生する可能性。"
    recommendation: |
      「normally」を明示的指示に置換:
      「Dispatch pilot Builder group via Agent tool with run_in_background: true.
      Wait for completion via task-notification before proceeding.」
    classification: "A"

  - id: "A17"
    source: "inspector-flow"
    severity: "L"
    category: "auto-draft"
    location: "framework/claude/skills/sdd-roadmap/SKILL.md:124"
    summary: "run モード完了時に handover.md が二重 auto-draft される"
    detail: |
      run.md Step 8c Post-gate と SKILL.md §Post-Completion の両方に「Auto-draft handover.md」があり、
      run 完了時に二重ドラフトが発生する。idempotent（上書き）のため機能的問題はないが、
      余分な処理とトークン消費が生じる。
    impact: "機能的影響なし。余分なトークン消費。"
    recommendation: |
      SKILL.md §Post-Completion に条件を追加:
      「Skip if run mode already drafted at Step 8c（全 wave が正常完了した場合）。
      Only run if pipeline was stopped mid-wave.」
    classification: "B"

  - id: "A18"
    source: "inspector-flow"
    severity: "L"
    category: "documentation-clarity"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:236"
    summary: "Part B Step 8.4 のパラレル Design Review 実行メカニズムが未定義"
    detail: |
      「Dispatch per spec (parallel) via /sdd-review design {feature}」と指示されているが、
      Skill 呼び出しはシーケンシャルである。run.md §Review Decomposition では Lead が
      sdd-review のステップを直接実行すると明記されているが revise.md Part B は
      Skill 呼び出し方式を指示しており、実行方法が不明確。
    impact: "並列設計の review がシリアル化され tier 実行が遅くなる可能性。機能的誤りではない。"
    recommendation: |
      Step 8.4 を明確化:「for each spec, dispatch Inspectors via Agent(run_in_background: true)
      following /sdd-review SKILL.md Steps 1-6. Alternatively, invoke sequentially
      if parallelism is not critical for this tier.」
    classification: "B"

  - id: "A19"
    source: "inspector-consistency"
    severity: "L"
    category: "protocol-inconsistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:77"
    summary: "sdd-review-self の claude コマンドに --include-partial-messages フラグが欠落"
    detail: |
      sdd-review の claude コマンドには `--include-partial-messages` があるが、
      sdd-review-self の claude コマンドにはない。
      このフラグはストリーミング中の部分メッセージ出力を制御する。
    impact: "長時間の Inspector 処理で部分メッセージが欠落する可能性がある。"
    recommendation: "sdd-review-self の claude コマンドに `--include-partial-messages` を追加する。"
    classification: "A"

  - id: "A20"
    source: "inspector-consistency"
    severity: "L"
    category: "protocol-inconsistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:78"
    summary: "sdd-review-self の gemini コマンドで -p フラグにプロンプト引数がない"
    detail: |
      sdd-review の gemini コマンドは `-p "..."` でプロンプトを渡すが、
      sdd-review-self では `-p` の後が `--model` になっており、`--model` が
      `-p` の引数として解釈される可能性がある。
    impact: "gemini エンジン使用時にプロンプトが正しく渡されずエラーまたは誤動作する可能性がある。"
    recommendation: |
      sdd-review-self の gemini コマンドを明確化:
        `npx -y @google/gemini-cli -p "Read the following instructions and review the framework." --model {model} --yolo`
    classification: "A"

  - id: "A21"
    source: "inspector-consistency"
    severity: "L"
    category: "numeric-inconsistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:219-225"
    summary: "sdd-review-self の verdicts.yaml スキーマに conditional エージェント数フィールドが欠落"
    detail: |
      sdd-review-self Step 9 のスキーマに `conditional:` フィールドがないが、
      verdict-format.md §4 は `conditional: 0  # Optional, default 0` として定義している。
      self-review では conditional Inspector が存在しないため省略は妥当だが、
      明示的に記述することでドキュメント一貫性が保たれる。
    impact: "verdicts.yaml を参照するツールが conditional フィールドを期待する場合に対処が必要になる。"
    recommendation: "Step 9 のスキーマに `conditional: 0  # self-review: always 0` を追加する。"
    classification: "A"

  - id: "A22"
    source: "inspector-dynamic-2"
    severity: "L"
    category: "schema-inconsistency"
    location: "framework/claude/skills/sdd-forge-skill/SKILL.md:202"
    summary: "evals.json テンプレートに schemas.md 未定義の skill_name フィールドが含まれる"
    detail: |
      SKILL.md Step 1 の evals.json サンプルにトップレベルの `"skill_name": "example-skill"` があるが、
      references/schemas.md の evals.json スキーマ定義にはこのフィールドが含まれない。
      aggregate_benchmark.py は --skill-name CLI 引数でスキル名を受け取るため evals.json からは読まない。
    impact: "SKILL.md サンプルをそのまま使うと schemas.md との乖離が生じる。"
    recommendation: "`skill_name` をサンプルから削除するか、schemas.md に optional フィールドとして追記する。"
    classification: "A"

  - id: "A23"
    source: "inspector-dynamic-2"
    severity: "L"
    category: "schema-inconsistency"
    location: "framework/claude/skills/sdd-forge-skill/SKILL.md:205"
    summary: "evals.json の id 型が SKILL.md (integer) と schemas.md (string) で不一致"
    detail: |
      SKILL.md サンプル: `"id": 1`（integer）
      schemas.md 定義: `"id": "string (unique identifier, e.g. eval-001)"`
      benchmark.json の `eval_id: "integer or string"` から両者とも許容されるが、
      サンプルの型と定義が食い違っている。
    impact: "実害は低いが、スキーマを文字列で統一している意図が伝わらない。"
    recommendation: "SKILL.md のサンプルを `\"id\": \"eval-001\"` に変更して schemas.md と統一する。"
    classification: "A"

  - id: "A24"
    source: "inspector-dynamic-2"
    severity: "L"
    category: "documentation-ambiguity"
    location: "framework/claude/skills/sdd-forge-skill/SKILL.md:270,312"
    summary: "Analyzer のロール (Role 1 vs Role 2) が呼び出し文脈で明示されていない"
    detail: |
      references/analyzer.md は Role 1（Comparison Analysis）と Role 2（Benchmark Analysis）の 2 ロールを持つ。
      SKILL.md Eval mode Step 5 と Compare mode Step 3 で Analyzer を dispatch するが、
      どちらのロールを使うか明示されていない。
      文脈から Eval → Role 2、Compare → Role 1 と推察できるが、明示されていない。
    impact: "Analyzer を初めて使うユーザーが正しいロールを選べない可能性がある。"
    recommendation: "各呼び出し箇所に `(Role 2: Benchmark Analysis)` / `(Role 1: Comparison Analysis)` を括弧書きで補記する。"
    classification: "A"

  - id: "A25"
    source: "inspector-dynamic-4"
    severity: "L"
    category: "design-inconsistency"
    location: "framework/claude/skills/sdd-review-self/references/auditor.md:8-12"
    summary: "auditor.md が findings / decisions パスをハードコードしており auditor-header.md の情報が事実上無視される"
    detail: |
      SKILL.md Step 6 は auditor-header.md にパス情報を書き込んで Auditor に渡すと記述するが、
      auditor.md はパスをハードコード（.sdd/project/reviews/self/active/ 等）している。
      外部エンジンは auditor.md のハードコードパスを使用し auditor-header.md のパスは無視される。
    impact: |
      現在は ACTIVE パスが固定のため機能的問題はない。しかし設計意図（動的パス渡し）と
      実装（ハードコード）の乖離により、将来のパス変更時に修正漏れが発生するリスクがある。
    recommendation: |
      選択 A: auditor.md を「ヘッダーからパスを読み取る」設計に変更（動的設計採用）。
      選択 B: SKILL.md Step 6 のヘッダーにパスを含める記述を削除（静的設計を正式化）。
    classification: "B"

  - id: "A26"
    source: "inspector-dynamic-4"
    severity: "L"
    category: "documentation-clarity"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:45-48"
    summary: "briefer-header.md のラベル名と briefer.md の変数名の対応関係が未定義"
    detail: |
      SKILL.md Step 4 が briefer-header.md に書き込むラベル:「Output directory:」「Template directory:」「Verdicts file:」
      briefer.md が参照する変数名: ACTIVE_DIR / TEMPLATE_DIR / VERDICTS_PATH
      対応関係のパース仕様がなく LLM の推論に依存している。
    impact: "将来ヘッダー形式を変更する際に briefer.md との同期が保証されない。"
    recommendation: |
      SKILL.md Step 4 の briefer-header.md 内容に変数名を一致させる:
        "ACTIVE_DIR: {ACTIVE}"
        "TEMPLATE_DIR: {SKILL_DIR}/references/"
        "VERDICTS_PATH: {SCOPE_DIR}/verdicts.yaml"
    classification: "A"

