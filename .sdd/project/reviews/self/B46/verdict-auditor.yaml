issues:
  # ── HIGH ──────────────────────────────────────────────────────────────────
  - id: "A1"
    source: "inspector-flow"
    severity: "H"
    category: "flow-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:49"
    summary: "Part A→B エスカレーション時のステアリング更新実行順序が不明瞭"
    detail: |
      Part A Step 3 Cross-Cutting 承認後の指示が「join Part B Step 2」を先に述べ、
      ステアリング更新（Part B Step 1.3）を補足として記載しているため、
      Lead が Step 1.3 をスキップして Step 2 から開始する誤解を招くリスクがある。
    impact: |
      ステアリング更新がスキップされると Architect が古いコンテキストで設計を行い、
      revision intent と乖離した design.md が生成される。
    recommendation: |
      Step 3 Cross-Cutting 承認フローを番号付きステップで明示:
      「User accepts → (1) Execute Part B Step 1.3 (steering update), then (2) proceed
      to Part B Step 2 with revision intent pre-populated. Skip only Part B Step 1.2.」
    classification: "A"

  - id: "A2"
    source: "inspector-flow"
    severity: "H"
    category: "flow-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:153"
    summary: "Part B Step 3 で作成した新規 spec が FULL 分類に含まれず tier 実行から漏れる"
    detail: |
      Step 2 Impact Analysis は「implementation-complete フェーズのみ」を対象とするため、
      Step 3 Restructuring Check で新規作成された spec（initialized フェーズ）は
      FULL リストに入らない。Step 7 は FULL specs のみからティア計画を構築するため、
      新規 spec が tier 実行から漏れる。
    impact: |
      cross-cutting revision で作成した新規 spec が設計・実装されないまま
      revision が完了してしまう可能性がある。変更内容の完全性が損なわれる。
    recommendation: |
      Step 3 末尾に追加:「After spec creation/restructuring: add newly created specs to
      FULL classification (they require full design + impl pipeline). Update tier plan
      in Step 7 to include these specs at the appropriate tier based on dependencies.」
    classification: "B"

  - id: "A3"
    source: "inspector-consistency"
    severity: "H"
    category: "path-inconsistency"
    location: "framework/claude/sdd/settings/rules/lead/tmux-integration.md:82-83"
    summary: "tmux-integration.md が sdd-start の Step 番号を誤参照（Step 7 → Step 6）"
    detail: |
      Grid Creation セクション「/sdd-start Step 7 で $SID 生成・Lead pane タイトル設定後に実行」
      および Orphan Cleanup セクションも「Step 7」と記述。しかし sdd-start.md では
      SID 生成(6a)/Lead Pane Title(6b)/Orphan Cleanup(6c)/Grid Setup(6d)/state.yaml(6e)
      は全て Step 6 に含まれ、Step 7 は Pipeline Continuation。
    impact: |
      両ファイルを参照して作業する際に混乱が生じ、sdd-start の将来変更時に
      誤った参照が残り続けるリスクがある。
    recommendation: |
      tmux-integration.md の「Step 7」参照を「Step 6 (6a-6e)」に修正:
      Grid Creation → 「Step 6d で」、Orphan Cleanup → 「Step 6c で」
    classification: "A"

  - id: "A4"
    source: "inspector-consistency"
    severity: "H"
    category: "protocol-inconsistency"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:76-77"
    summary: "sdd-review-self の codex コマンドが stdin indicator (-) を欠き、-m フラグ名も不一致"
    detail: |
      sdd-review-self の codex コマンド:
        `npx -y @openai/codex exec --full-auto -m {model} -c model_reasoning_effort='"{effort}"' -q`
      sdd-review の codex コマンドは末尾に `-` （stdin 読み取り指示）があり、`--model` を使用。
      sdd-review-self も `cat ... | {engine_cmd}` で stdin パイプを使用するため、
      `-` がないとプロンプトが渡されない。また `-q` / `-m` も sdd-review と不一致。
      （Consistency-F2 と F7 を統合した finding）
    impact: |
      codex エンジン使用時にプロンプトが渡されずサイレント失敗し、findings ファイルが
      未生成となる。Runtime Escalation が意図せず発動する。
    recommendation: |
      sdd-review-self の codex コマンドを以下に修正:
        `npx -y @openai/codex exec --full-auto --model {model} -c model_reasoning_effort='"{effort}"' -`
      `-q` を削除し、`-m` を `--model` に変更し、末尾に `-` を追加する。
    classification: "A"

  # ── MEDIUM ────────────────────────────────────────────────────────────────
  - id: "A5"
    source: "inspector-flow"
    severity: "M"
    category: "flow-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:163"
    summary: "Readiness Rules の Implementation 条件に誤った Layer 番号が記載されている"
    detail: |
      「No file overlap with any spec currently in Implementation (Cross-Spec File
      Ownership Layer 2)」と記載されているが、Readiness Rules のチェックは dispatch
      ループ内（Layer 1 の結果を反映）であり、Layer 2 は post-TaskGenerator の
      再チェック。「Layer 2」という注記が誤解を招く。
    impact: |
      Lead が「Layer 2 = post-TaskGenerator 完了後のみ評価可能」と解釈すると、
      readiness 評価が遅延・シリアル化するリスクがある。
    recommendation: |
      「(Cross-Spec File Ownership Layer 1 result)」に変更するか、
      「(enforced by Layer 1 pre-dispatch analysis; refined by Layer 2 post-TaskGenerator)」と明記する。
    classification: "A"

  - id: "A6"
    source: "inspector-flow"
    severity: "M"
    category: "flow-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:97"
    summary: "Part A Step 6 option (d) の Cross-Cutting join に Part B Step 1 スキップ仕様が未記載"
    detail: |
      option (d) は「join Part B Step 2」と指示するが、Part B Step 1 の扱いが未記載。
      Part A Step 3 経路には「Step 1.1 N/A, Step 1.2 skip, Step 1.3 必ず実行」の注記があるが
      option (d) には相当する説明がない。
    impact: |
      Lead が Part B Step 1 を全スキップすると downstream revision に必要なステアリング更新が
      行われない。逆に全実行すると収集済みの intent を再度 AskUserQuestion する。
    recommendation: |
      option (d) に追記:「Note: Part B Step 1.1 is N/A (intent known from main spec);
      Step 1.2 recording if this downstream revision constitutes a new decision;
      Step 1.3 steering update if downstream revision implies direction changes.」
    classification: "A"

  - id: "A7"
    source: "inspector-flow"
    severity: "M"
    category: "verdict-format"
    location: "framework/claude/sdd/settings/rules/agent/verdict-format.md:165"
    summary: "disposition コード NO-GO-FIXED の説明が Builder 修正ケースのみをカバー"
    detail: |
      `NO-GO-FIXED` の説明が「Issues fixed by Builder」のみ。しかし run.md Phase Handler の
      Design Review NO-GO 時は Architect が修正して同じ disposition を使用する。
      Builder 修正（Impl Review）と Architect 修正（Design Review）の両方を表すが説明は片方のみ。
    impact: "審査証跡で Design Review の Architect 修正が誤分類される可能性がある。"
    recommendation: |
      説明を更新:
      `NO-GO-FIXED: "NO-GO issues addressed (Architect for design review, Builder for impl review)"`
    classification: "A"

  - id: "A8"
    source: "inspector-consistency"
    severity: "M"
    category: "protocol-inconsistency"
    location: "framework/claude/skills/sdd-review-self/references/auditor.md:86-88"
    summary: "self-review Auditor が classification フィールドを verdict-auditor.yaml に含めているが、verdict-format.md では Lead 専任フィールド"
    detail: |
      auditor.md の Step 7 では verdict-auditor.yaml に `classification: "A"/"B"` を含むが、
      verdict-format.md §2 の Auditor Verdict スキーマには classification は存在せず、
      §3 Lead Final Verdict のみで定義されている。§4 Per-Item Lifecycle も
      「classification: Lead が設定」と明記。
    impact: |
      Lead の独立した A/B 判定が Auditor draft に引きずられる可能性がある。
      また verdict-format.md 更新時に auditor.md との同期が必要という依存が不明示のまま残る。
    recommendation: |
      選択 A: auditor.md から classification フィールドを削除し verdict-format.md §2 に準拠。
      Lead supervision ステップで A/B 分類を明示的に Lead が決定する旨を記述する。
      選択 B: verdict-format.md §2 に classification フィールドを追加し「Auditor-suggested,
      Lead confirms」と明記（D192 の設計意図に沿った spec 更新）。
    classification: "B"

  - id: "A9"
    source: "inspector-compliance"
    severity: "M"
    category: "documentation-uncertainty"
    location: "framework/claude/skills/sdd-review-self/SKILL.md:1-4"
    summary: "space-separated allowed-tools フォーマットの動作が公式ドキュメント未確認"
    detail: |
      sdd-review-self, sdd-handover, sdd-log の allowed-tools がスペース区切り（"Read Write Edit..."）。
      他のスキルはカンマ区切り（"Bash, Read, Write"）。公式ドキュメントの例はカンマ区切りのみ。
      スペース区切りが Claude Code 内部パーサーで正しく処理されるかドキュメントで未確認。
      実運用でエラー報告はないため機能している可能性が高いが、仕様として未保証。
    impact: "パーサーがカンマのみを区切り文字として扱う場合、ツール権限が意図通り設定されない。"
    recommendation: |
      該当 3 スキルの allowed-tools をカンマ区切りに統一する、
      または実際の動作を検証してスペース区切りが有効であることをドキュメントに明記する。
    classification: "B"

  - id: "A10"
    source: "inspector-dynamic-3"
    severity: "M"
    category: "stale-artifact"
    location: "framework/claude/sdd/settings/templates/review-self/briefer.md:29"
    summary: "テンプレート briefer.md の rules/*.md グロブがサブディレクトリを収集しない"
    detail: |
