notes: |
  ## 総合評価

  全 7 Inspector (fixed 3 + dynamic 4) の findings を統合。29 件確定、FP 1 件除外。

  ### CONDITIONAL 判定の根拠

  H findings 9 件を確認したが、NO-GO とせず CONDITIONAL とした理由:
  1. CRITICAL (基本フロー遮断) は 0 件
  2. H のうち A5/A6 (旧 template 二重定義) は現行 SKILL.md が lib/prompts/ を参照するため通常運用への直接影響は限定的
  3. H のうち A7/A8 (CLAUDE.md 誤記・name 欠落) は docs/frontmatter の整合性問題で操作的ブロッカーではない
  4. 実際の動作ブロッカーは A1-A3 (cross-cutting routing) と A9 (dynamic inspector refs) だが、cross-cutting は特定パスのみで通常の single-spec/wave フローは影響なし

  ### 主要クラスター

  **Cluster 1 — Cross-Cutting routing bugs (A1, A2, A3):**
  revise Step 9 の cross-check 誤配線 (A3) は即 A 修正可能。Router の cross-cutting 扱い (A1) と verdict persistence ordering (A2) は B 判断が必要。

  **Cluster 2 — legacy settings/templates/review-self/ (A5, A6, A13, A17, A18, A19):**
  settings/templates/review-self/ ディレクトリ全体を配布対象から除外することで一括解決可能。lib/prompts/ が正本。

  **Cluster 3 — install.sh update hygiene (A13, A14, A28):**
  SKILL.md.bak1 削除 (A28) と install.sh の *.bak* 除外が近道。--update stale cleanup (A14) はより広範な設計判断。

  **Cluster 4 — doc/metadata drift (A7, A8, A15, A21, A22):**
  すべて auto-fix 可能。CLAUDE.md の builder stage 誤記と Auditor Opus 誤記は同一ファイル内で同時修正推奨。

  **Cluster 5 — reference index quality (A9, A26, A27):**
  A9 (dynamic inspector への on_demand refs 未配布) が最も影響大。briefer.md の Step 4 改修が必要。
