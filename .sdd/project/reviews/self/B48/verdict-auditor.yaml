    location: "framework/claude/skills/sdd-roadmap/SKILL.md:24"
    summary: "Router が `review impl --cross-cutting` を全体スコープ review として一貫して扱っていない"
    detail: "Detect Mode では `review impl --cross-cutting {specs}` を受理しているが、Single-Spec Roadmap Ensure の whole-scope 例外リスト、no-roadmap 時の BLOCK 条件、Execution Reference の Review 委譲説明には `--cross-cutting` が含まれていない。"
    impact: "単独の `/sdd-roadmap review impl --cross-cutting ...` が spec enrollment チェックや 1-spec 自動生成系の分岐に吸い込まれ、Cross-Cutting review へ安定して到達できない。Router dispatch completeness と phase-independent routing が崩れる。"
    recommendation: "Single-Spec Roadmap Ensure の例外一覧と no-roadmap BLOCK 条件に `review impl --cross-cutting` を追加し、Execution Reference でも `/sdd-review impl --cross-cutting {specs} --id {cc_id}` への直接委譲を明記する。"
    classification: "B"
    ref: null

  - id: "A2"
    source: "inspector-flow"
    severity: "H"
    category: "verdict-persistence"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:147"
    summary: "Dispatch loop が auto-fix 判定前に review batch を確定・退避しており verdict.yaml 更新手順と両立しない"
    detail: "AUDITOR-COMPLETE では verdicts.yaml 追記と active→B{seq} archive を完了させるが、直後の Phase Handler は NO-GO/SPEC-UPDATE-NEEDED で verdict.yaml の user_decision/resolution/disposition 更新と再 archive を要求する。verdict-format の正規フローではこれらの更新は archive 前に active/ 内で完了していなければならない。"
    impact: "run パイプラインの NO-GO/SPEC-UPDATE auto-fix で更新対象の active/verdict.yaml が既に退避済みとなり、verdict.yaml と verdicts.yaml の内容が乖離する。Verdict persistence と auto-fix loop の監査証跡が壊れる。"
    recommendation: "dispatch-loop 用には sdd-review の persistence/archive を遅延させ、Phase Handler で disposition と resolution を確定してから verdicts.yaml 追記と archive を 1 回だけ実行する。standalone review と run pipeline で Step 9 の責務を分離する。"
    classification: "B"
    ref: null

  - id: "A3"
    source: "inspector-flow"
    severity: "H"
    category: "revise-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:265"
    summary: "Cross-Cutting revise の再試行先が cross-cutting review ではなく cross-check review に誤配線されている"
    detail: "Step 9 は最初に `/sdd-review impl --cross-cutting {spec1,spec2,...} --id {CC_ID}` を実行すると定義するが、NO-GO と SPEC-UPDATE-NEEDED の両分岐では 'cross-check review' と記載されている。cross-check は wave QG 専用の別スコープ。"
    impact: "修正後の再レビューが Cross-Cutting revise の専用スコープから wave cross-check 系フローへ逸脱し、Single-Spec/Cross-Cutting mode の切り替えと escalation path が壊れる。"
    recommendation: "Step 9 の再試行先を一貫して `/sdd-review impl --cross-cutting {specs} --id {CC_ID}` に統一し、cross-check は Wave QG 専用であることを明示する。"
    classification: "A"
    ref: null

