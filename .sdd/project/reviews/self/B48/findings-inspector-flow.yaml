scope: "inspector-flow"
issues:
  - id: "F1"
    severity: "H"
    category: "router-dispatch"
    location: "framework/claude/skills/sdd-roadmap/SKILL.md:24"
    summary: "Router が `review impl --cross-cutting` を全体スコープ review として一貫して扱っていない"
    detail: "Detect Mode では `review impl --cross-cutting {specs}` を Review Subcommand として受理している一方で、Single-Spec Roadmap Ensure の whole-scope 例外 (`framework/claude/skills/sdd-roadmap/SKILL.md:78`) と no-roadmap 時の BLOCK 条件 (`framework/claude/skills/sdd-roadmap/SKILL.md:80`)、Execution Reference の Review 委譲説明 (`framework/claude/skills/sdd-roadmap/SKILL.md:106`) には `--cross-cutting` が含まれていない。"
    impact: "単独の `/sdd-roadmap review impl --cross-cutting ...` が spec enrollment チェックや 1-spec 自動生成系の分岐に吸い込まれ、Cross-Cutting review へ安定して到達できない。Router dispatch completeness と phase-independent routing が崩れる。"
    recommendation: "Single-Spec Roadmap Ensure の例外一覧と no-roadmap BLOCK 条件に `review impl --cross-cutting` を追加し、Execution Reference でも `/sdd-review impl --cross-cutting {specs} --id {cc_id}` への直接委譲を明記する。"
  - id: "F2"
    severity: "H"
    category: "verdict-persistence"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:147"
    summary: "Dispatch loop が auto-fix 判定前に review batch を確定・退避しており、その後の `verdict.yaml` 更新手順と両立しない"
    detail: "AUDITOR-COMPLETE では sdd-review Steps 8-9 を実行して `verdicts.yaml` 追記と `active -> B{seq}` archive を完了させる (`framework/claude/skills/sdd-roadmap/refs/run.md:147-150`) が、その直後の Phase Handler は `NO-GO` / `SPEC-UPDATE-NEEDED` で `verdict.yaml` の `user_decision` / `resolution` / `resolution_note` / `disposition` 更新と再 archive を要求している (`framework/claude/skills/sdd-roadmap/refs/run.md:193`, `framework/claude/skills/sdd-roadmap/refs/run.md:207-208`)。しかし verdict-format の正規フローでは、これらの更新は archive 前に `active/` 内の `verdict.yaml` へ反映されていなければならない (`framework/claude/sdd/settings/rules/agent/verdict-format.md:293-307`)。"
    impact: "run パイプラインの NO-GO / SPEC-UPDATE auto-fix で、更新対象の `active/verdict.yaml` が既に退避済みとなり、`verdict.yaml` と `verdicts.yaml` の内容が乖離する。Verdict persistence と auto-fix loop の監査証跡が壊れる。"
    recommendation: "dispatch-loop 用には sdd-review の persistence/archive を遅延させ、Phase Handler で disposition と resolution を確定してから `verdicts.yaml` 追記と archive を 1 回だけ実行する。少なくとも standalone review と run pipeline で Step 9 の責務を分離する。"
  - id: "F3"
    severity: "H"
    category: "revise-routing"
    location: "framework/claude/skills/sdd-roadmap/refs/revise.md:265"
    summary: "Cross-Cutting revise の再試行先が `cross-cutting` review ではなく `cross-check` review に誤配線されている"
    detail: "Step 9 は最初に `/sdd-review impl --cross-cutting {spec1,spec2,...} --id {CC_ID}` を実行すると定義している (`framework/claude/skills/sdd-roadmap/refs/revise.md:261`) が、`NO-GO` と `SPEC-UPDATE-NEEDED` の両分岐では『re-run cross-check review』と記載されている (`framework/claude/skills/sdd-roadmap/refs/revise.md:265-266`)。cross-check は wave QG 用の別スコープであり、保存先も `specs/.cross-cutting/{CC_ID}` ではない。"
    impact: "修正後の再レビューが Cross-Cutting revise の専用スコープから wave cross-check 系フローへ逸脱し、Single-Spec/Cross-Cutting mode の切り替えと escalation path が壊れる。"
    recommendation: "Step 9 の再試行先を一貫して `/sdd-review impl --cross-cutting {specs} --id {CC_ID}` に統一し、cross-check は Wave QG 専用であることを明示する。"
  - id: "F4"
    severity: "M"
    category: "phase-gate"
    location: "framework/claude/skills/sdd-roadmap/refs/run.md:162"
    summary: "Lookahead spec の依存 design 差し戻し時に既存の Design Review 合格を無効化しない"
    detail: "Design Review readiness は『latest design batch verdict が absent または NO-GO』なら再レビュー対象、GO/CONDITIONAL なら通過済みとして扱う (`framework/claude/skills/sdd-roadmap/refs/run.md:162`)。一方で staleness guard は依存 spec の design 変更時に lookahead spec の `phase`、`version_refs.design`、`last_phase_action` だけを初期化し (`framework/claude/skills/sdd-roadmap/refs/run.md:177`)、既存の design review batch を無効扱いにする条件を定義していない。"
    impact: "lookahead spec が旧依存 design に対する GO review を保持したまま新 design へ進み、mandatory な Design Review を飛ばして Implementation readiness を満たせる。Phase gate consistency が崩れる。"
    recommendation: "staleness guard で lookahead spec の最新 design review batch を無効化するか、readiness 判定を `version_refs.design` と verdict batch の設計版整合まで比較する方式に変更する。"
  - id: "F5"
    severity: "L"
    category: "read-clarity"
    location: "framework/claude/skills/sdd-roadmap/SKILL.md:106"
    summary: "Router の Review 説明に `cross-cutting` の ref 読み順と委譲先が明示されていない"
    detail: "Execution Reference の Review 行は `design, impl, dead-code, --cross-check, --wave` のみを列挙しており (`framework/claude/skills/sdd-roadmap/SKILL.md:106`)、Detect Mode で受理する `review impl --cross-cutting` (`framework/claude/skills/sdd-roadmap/SKILL.md:24`) や `refs/revise.md` Step 9 からの cross-cutting review 再入との関係が読めない。"
    impact: "Router がいつ `refs/revise.md` を読み、いつ `/sdd-review` へ直接委譲するのかが追いにくく、flow maintenance 時に cross-cutting review の経路を誤って修正しやすい。"
    recommendation: "Execution Reference に `review impl --cross-cutting {specs}` を追加し、standalone review と revise からの再入の双方が `/sdd-review` へ委譲されることを明示する。"
notes: |
  `empty roadmap` (`framework/claude/skills/sdd-roadmap/refs/run.md:8`)、1-spec 最適化 (`framework/claude/skills/sdd-roadmap/SKILL.md:92-96`)、blocked spec (`framework/claude/skills/sdd-roadmap/refs/run.md:111`, `framework/claude/skills/sdd-roadmap/refs/run.md:274`)、retry limit exhaustion (`framework/claude/CLAUDE.md:183`, `framework/claude/skills/sdd-roadmap/refs/run.md:209`) は明示されており、追加の flow break は見つからなかった。
