# Decision log for project lifecycle
# Append-only. ID sequence continues across sessions (gaps allowed).
entries: []
# Entry schema:
# - id: "D{N}"
#   type: "USER_DECISION|STEERING_UPDATE|DIRECTION_CHANGE|ESCALATION_RESOLVED|REVISION_INITIATED|STEERING_EXCEPTION|SESSION_START|SESSION_END"
#   summary: "{one-line summary}"
#   context: "{context description}"
#   detail: "{detailed description}"
#   reason: "{why}"        # optional for SESSION_START/SESSION_END
#   impact: "{what this affects}"  # optional for SESSION_START/SESSION_END
#   source: "user|lead|auditor"
#   steering_ref: "{ref}"  # STEERING_EXCEPTION only
#   superseded_by: "D{M}"  # optional
#   created_at: "{ISO-8601}"
