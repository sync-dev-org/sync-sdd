  - id: "I28"
    type: "BUG"
    status: "open"
    severity: "H"
    summary: "sdd-review-self reforge: Lead がテンプレートを Read する設計に退化 — コンテキスト保全の最適化喪失"
    detail: "旧版では Briefer/Inspector/Auditor のテンプレートを Lead が Read せず cat file | engine_cmd で Bash 直接 pipe していた（コンテキスト保全の最適化）。新版は SKILL.md L42, L129 で Lead に Read を指示しており、この最適化が失われている。Builder のみ動的コンテンツ (FINDINGS) のため Lead Read が必要で、これは例外として正しい。references/ 内のハードコードパス (Concern 4) もこの設計の帰結 — Lead が展開しないのでハードコードが正しい。修正内容: (1) Briefer/Auditor dispatch を cat pipe パターンに戻す (2) Inspector テンプレートのファイルリスト glob を references/ に内包 (Concern A) (3) timeout/jq check/tools/zombie check の復元 (Concerns 2,3,5,6)"
    source: "lead"
    created_at: "2026-03-08T14:11:56+0900"

  - id: "I29"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: "jq 可用性チェックを sdd-start に移動 + 自動インストール"
    detail: "現在は sdd-review-self の engine resolution 中に claude engine 使用時のみ jq チェックしている。sdd-review も同じ依存がある。sdd-start で一括チェック + 自動インストールすればセッション中の全スキルで保証される。クロスプラットフォーム対応: macOS (brew install jq)、Windows (winget install jq)、Linux/WSL2/Docker (apt install jq をデフォルトとし、ディストリ違いは Lead に自律判断させる)。sdd-review-self reforge (I28) からは jq チェックを除去し sdd-start に委譲"
    source: "user"
    created_at: "2026-03-08T14:16:30+0900"

  - id: "I32"
    type: "BUG"
    status: "open"
    severity: "M"
    summary: "sdd-start が開幕直後にセキュリティヒューリスティクスを踏む Bash コマンドを発行"
    detail: "sdd-start Step 1 で Lead が `cat VERSION 2>/dev/null; echo \"---\"; git branch --show-current; echo \"---\"; git status --short` を実行。`;` + クォート内ダッシュ `\"---\"` の組み合わせで「quoted characters in flag names」ヒューリスティクスが発火し承認プロンプトが出る。`2>/dev/null` の stderr リダイレクトも別途ヒューリスティクス対象。sdd-start reforge 時に考慮すべき"
    source: "user"
    created_at: "2026-03-08T14:55:38+0900"

  - id: "I33"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: ".sdd/settings/ 階層の再設計 — bash-security-heuristics.md の配置問題を起点とするリファクタリング"
    detail: "bash-security-heuristics.md は Claude Code プラットフォーム制約の知識であり、rules でも settings でもない。現在 .sdd/settings/rules/lead/ に配置されているが、Lead 固有ではなく Inspector/Auditor/Writer も参照する必要がある。暫定的に現在の場所を維持し、review-self は rules/lead/ を直接参照する。sdd-review, sdd-forge-skill にも同じ FP 問題があり、リファクタリング時にまとめて対応する。settings/ 配下の rules/templates/profiles/scripts の分類自体も再検討対象"
    source: "user"
    created_at: "2026-03-08T15:41:50+0900"
