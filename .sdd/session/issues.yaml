  - id: "I28"
    type: "BUG"
    status: "open"
    severity: "H"
    summary: "sdd-review-self reforge: Lead がテンプレートを Read する設計に退化 — コンテキスト保全の最適化喪失"
    detail: "旧版では Briefer/Inspector/Auditor のテンプレートを Lead が Read せず cat file | engine_cmd で Bash 直接 pipe していた（コンテキスト保全の最適化）。新版は SKILL.md L42, L129 で Lead に Read を指示しており、この最適化が失われている。Builder のみ動的コンテンツ (FINDINGS) のため Lead Read が必要で、これは例外として正しい。references/ 内のハードコードパス (Concern 4) もこの設計の帰結 — Lead が展開しないのでハードコードが正しい。修正内容: (1) Briefer/Auditor dispatch を cat pipe パターンに戻す (2) Inspector テンプレートのファイルリスト glob を references/ に内包 (Concern A) (3) timeout/jq check/tools/zombie check の復元 (Concerns 2,3,5,6)"
    source: "lead"
    created_at: "2026-03-08T14:11:56+0900"

  - id: "I29"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: "jq 可用性チェックを sdd-start に移動 + 自動インストール"
    detail: "現在は sdd-review-self の engine resolution 中に claude engine 使用時のみ jq チェックしている。sdd-review も同じ依存がある。sdd-start で一括チェック + 自動インストールすればセッション中の全スキルで保証される。クロスプラットフォーム対応: macOS (brew install jq)、Windows (winget install jq)、Linux/WSL2/Docker (apt install jq をデフォルトとし、ディストリ違いは Lead に自律判断させる)。sdd-review-self reforge (I28) からは jq チェックを除去し sdd-start に委譲"
    source: "user"
    created_at: "2026-03-08T14:16:30+0900"

  - id: "I32"
    type: "BUG"
    status: "open"
    severity: "M"
    summary: "sdd-start が開幕直後にセキュリティヒューリスティクスを踏む Bash コマンドを発行"
    detail: "sdd-start Step 1 で Lead が `cat VERSION 2>/dev/null; echo \"---\"; git branch --show-current; echo \"---\"; git status --short` を実行。`;` + クォート内ダッシュ `\"---\"` の組み合わせで「quoted characters in flag names」ヒューリスティクスが発火し承認プロンプトが出る。`2>/dev/null` の stderr リダイレクトも別途ヒューリスティクス対象。sdd-start reforge 時に考慮すべき"
    source: "user"
    created_at: "2026-03-08T14:55:38+0900"

  - id: "I33"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: ".sdd/settings/ 階層の再設計 — bash-security-heuristics.md の配置問題を起点とするリファクタリング"
    detail: "bash-security-heuristics.md は Claude Code プラットフォーム制約の知識であり、rules でも settings でもない。現在 .sdd/settings/rules/lead/ に配置されているが、Lead 固有ではなく Inspector/Auditor/Writer も参照する必要がある。暫定的に現在の場所を維持し、review-self は rules/lead/ を直接参照する。sdd-review, sdd-forge-skill にも同じ FP 問題があり、リファクタリング時にまとめて対応する。settings/ 配下の rules/templates/profiles/scripts の分類自体も再検討対象"
    source: "user"
    created_at: "2026-03-08T15:41:50+0900"

  - id: "I34"
    type: "BUG"
    status: "open"
    severity: "H"
    summary: "codex CLI が -q フラグを拒否 — SKILL.md のエンジンコマンドテンプレートが最新版と不一致"
    detail: "codex-cli 0.111.0 で `-q` フラグが `error: unexpected argument '-q' found` で拒否される。`codex exec --help` で確認: `-q` オプションは存在しない (廃止ではなく、元々存在しなかった可能性が高い)。SKILL.md の Engine Command Construction テーブルの codex 行末尾 `-q` を削除する必要がある。追加検証: (1) `-m` と `--model` は両方有効 (help に `-m, --model <MODEL>` と記載) — Auditor A4 の `-m`→`--model` 指摘は過剰 (2) stdin 読み取りは PROMPT 引数なし or `-` 指定で自動動作 — `-` なしでも `cat | codex exec` は動くが明示的に `-` を付けるのが安全 (3) `--full-auto` は有効。修正: `-q` を削除し末尾に `-` を追加 → `npx -y @openai/codex exec --full-auto -m {model} -c model_reasoning_effort='\"{effort}\"' -`。影響範囲: sdd-review-self SKILL.md + sdd-review SKILL.md (同じテンプレートを使用)"
    source: "lead"
    created_at: "2026-03-08T15:58:56+0900"

  - id: "I35"
    type: "BUG"
    status: "open"
    severity: "M"
    summary: "sdd-review-self の Inspector dispatch で pane タイトルが更新されていない — デグレ"
    detail: "I28 修正後の sdd-review-self で Inspector を tmux slot に dispatch する際、pane タイトルが設定されていない。旧版では send-keys 前に tmux select-pane -T でタイトルを設定していたが、reforge 後の SKILL.md にタイトル設定の指示がない。タイトルは装飾用 (D164) だが、ユーザーが各 pane で何が実行中かを視認するための UX として重要。SKILL.md の tmux dispatch フローにタイトル設定ステップを追加する必要がある"
    source: "user"
    created_at: "2026-03-08T16:06:09+0900"

  - id: "I36"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: "sdd-review-self SKILL.md: briefer-header.md のラベル名と briefer.md の変数名の対応関係が未定義"
    detail: "SKILL.md Step 4 が briefer-header.md に書き込むラベル (Output directory: / Template directory: / Verdicts file:) と、briefer.md が参照する変数名 (ACTIVE_DIR / TEMPLATE_DIR / VERDICTS_PATH) の対応関係が未定義。LLM 推論に依存して動作しているが、ヘッダー形式変更時に同期が保証されない。B46 動作確認で Briefer は正常動作したが設計上の脆弱性。対策: ラベルを変数名に一致させるか、briefer.md 側に対応テーブルを記載"
    source: "lead"
    created_at: "2026-03-08T17:01:31+0900"

  - id: "I37"
    type: "ENHANCEMENT"
    status: "open"
    severity: "M"
    summary: "sdd-review-self SKILL.md: hold-and-release コマンドチェーン構造が未記載"
    detail: "SKILL.md Step 5 は「hold-and-release pattern」「staggered parallel dispatch」と指示するが、具体的なコマンドチェーン構造 (close channel の命名規則、send-keys 内の wait-for チェーン、release の tmux wait-for -S 送信) が SKILL.md に記載されていない。Lead は tmux-integration.md を別途参照して構築する必要があり、SKILL.md 単体では Inspector dispatch を構成できない。対策: Step 5 に close channel 命名規則とコマンドチェーンのサンプルを追加するか、tmux-integration.md Pattern B の「Hold-and-Release」を明示的に参照する指示を追加"
    source: "lead"
    created_at: "2026-03-08T17:01:31+0900"

  - id: "I38"
    type: "ENHANCEMENT"
    status: "open"
    severity: "L"
    summary: "sdd-review-self SKILL.md: Inspector 完了後の close channel 送信タイミングが暗黙的"
    detail: "SKILL.md Step 5 Inspector Completion セクションの記述順が「verify findings files → release all slots by sending close channel signal」で、全 Inspector の wait-for 完了確認が暗黙前提。wait-for の task-notification が全て到着した後に close channel を送信すべきだが、その前提条件が明示されていない。B46 動作確認では全 wait-for 完了後に送信して正常動作。対策: Inspector Completion セクションの冒頭に「After all Inspector wait-for channels have signaled completion (confirmed via task-notification):」を追加"
    source: "lead"
    created_at: "2026-03-08T17:01:31+0900"

  - id: "I39"
    type: "FEATURE"
    status: "open"
    severity: "M"
    summary: "knowledge システム拡張 — knowledge.yaml を索引化し詳細ドキュメントへのポインタとする"
    detail: "現在の knowledge.yaml は summary + detail の 1-2 行エントリで有用だが、セキュリティヒューリスティクス文書 (bash-security-heuristics.md) やスキル作成手引き (skill-reference.md) レベルの構造化された大規模知識は格納できない。knowledge.yaml を索引 (index) として維持し、各エントリに詳細ドキュメントへのパスポインタ (ref フィールド等) を持たせる案。詳細ドキュメントは .sdd/session/knowledge/ や .sdd/project/knowledge/ に Markdown で格納。これにより knowledge.yaml の軽量性を維持しつつ、深い知見を体系的に蓄積・参照できる。検討事項: (1) ref フィールドのスキーマ設計 (2) 詳細ドキュメントの配置先 (session/ vs project/) (3) 既存の rules/lead/ や references/ との棲み分け (4) sdd-handover consolidation 時の扱い (5) knowledge promotion パスとの統合"
    source: "user"
    created_at: "2026-03-08T17:06:20+0900"
