  - id: "I21"
    type: "BUG"
    status: "open"
    severity: "H"
    summary: "gh コマンドが全て自動承認不能 — セキュリティヒューリスティクスにより数時間のブロッキング発生"
    detail: "settings.json に Bash(gh *) が登録済みだが、Claude Code のセキュリティヒューリスティクスが優先され毎回承認プロンプトが表示される。ブロックされたコマンドパターン: (1) gh api repos/.../contents/... -q '.content' | base64 -d (パイプ+base64デコード) (2) gh api repos/.../git/trees/main?recursive=1 -q '...' (クエリパラメータ付きAPI) (3) gh api ... -q '.content' | base64 -d > file (パイプ+リダイレクト出力)。共通要因: パイプ (|) が settings.json allow の先頭コマンドマッチを阻害、かつ base64 -d や > リダイレクトがセキュリティヒューリスティクスを誘発。sdd-skill-creator の GitHub API ファイル取得 (18ファイル) で全コマンドがブロックされ数時間のロス"
    source: "user"
    created_at: "2026-03-07T19:28:22+0900"

  - id: "I22"
    type: "ENHANCEMENT"
    status: "open"
    severity: "H"
    summary: "セキュリティヒューリスティクスパターンの根絶 — 安全なコマンド組み立てガイド作成"
    detail: "Claude Code のセキュリティヒューリスティクスで承認プロンプトが出るパターンを体系的に整理し、ガイドドキュメントを作成する。内容: (1) どんなパターンが引っ掛かるか (既知: パイプ|, $()コマンド置換, ${}パラメータ置換, &&連結, 空クォート+ダッシュ, 2>/dev/null, #{}tmuxフォーマット, --count等の一部フラグ名) (2) 安全なコマンド組み立て方法 (回避パターン集) (3) コマンド種別ごとの用例集 (gh, git, curl, tmux 等の OK/NG パターン対比) (4) NGパターン一覧 (やってはいけないコマンド構造)。現行の bash-security-heuristics.md (MEMORY.md から参照) を拡充するか、新規ドキュメントとして作成。CLAUDE.md Bash セキュリティヒューリスティクス回避セクションとも統合検討"
    source: "user"
    created_at: "2026-03-07T21:55:54+0900"

