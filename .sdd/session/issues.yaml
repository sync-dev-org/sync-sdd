    detail: "v1 (旧手書き版) では AskUserQuestion を指示し正常に発火していた。allowed-tools に含めなくても main context では通常の承認フローで動作する。bak4 版も指示はあったが Lead がテキスト出力で済ませた。v6 では AskUserQuestion の参照自体を削除してしまった — これは誤った修正。正しい対応: v6 に AskUserQuestion 呼び出し指示を戻す。allowed-tools には含めない (含めると空回答バグ) が、スキル本文での指示は必要"
