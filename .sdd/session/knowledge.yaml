entries:
  - id: "K1"
    type: "INCIDENT"
    severity: "H"
    summary: "append-only ファイルへの追記に Bash printf >> を使用"
    detail: "ファイル操作は常に専用ツール (Read/Edit/Write) を使う。追記も Edit で末尾に挿入する"
    impact: "ファイル内容の破損リスク"
    recommendation: "Bash の echo/printf/cat によるファイル書き込みは禁止"
    source: "B44 self-review, Lead"
    created_at: "2026-03-07T04:35:58+0900"
  - id: "K2"
    type: "INCIDENT"
    severity: "H"
    summary: "SubAgent 並列ファイル書き込みで権限拒否 (解決済み)"
    detail: "Task tool による並列ファイル書き込みで一部エージェントが Write/Edit 権限を拒否される。mode: bypassPermissions でも UI 承認ダイアログの並列競合が原因"
    impact: "SubAgent がファイル出力できず Lead の代理書き込みが必要だった"
    recommendation: "SubAgent モード移行で解消済み。Agent tool は権限問題なし"
    source: "retroactive-spec-creation Lead, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
  - id: "K3"
    type: "PATTERN"
    severity: "M"
    summary: "Write Fallback Protocol (解決済み)"
    detail: "SubAgent が書き込み失敗時、completion report に [WRITE_FALLBACK] タグ + ファイルパス + 全コンテンツを出力 → Lead が代理書き込み"
    impact: "SubAgent の書き込み失敗に対する回避策だった"
    recommendation: "SubAgent モード移行で不要。Agent tool は直接ファイル書き込み可能"
    source: "retroactive-spec-creation Lead, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
  - id: "K4"
    type: "INCIDENT"
    severity: "H"
    summary: "hatch-vcs で git tag 後に importlib.metadata.version() が旧バージョンを返す"
    detail: "editable install のメタデータキャッシュが原因。正しい修正: uv sync --reinstall-package {pkg} (NOT uv pip install -e .)"
    impact: "リリース後のバージョン検証が失敗する"
    recommendation: "sdd-release の Post-Release Verification に反映済み"
    source: "release-automation Builder, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
  - id: "K5"
    type: "PATTERN"
    severity: "M"
    summary: "Markdown スキルファイル (AI agent instructions) の TDD パターン"
    detail: "RED = spec ACs が未実装であることを確認、GREEN = AC を満たすコンテンツ記述、REFACTOR = 設計との整合性レビュー。diff 検証が sync コピーの機能テスト相当"
    impact: "SKILL.md 等のプロンプトファイルの品質保証手法"
    recommendation: "プロンプトエンジニアリングの TDD として継続使用"
    source: "release-automation Builder, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
