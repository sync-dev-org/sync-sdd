entries:
  - id: "K1"
    status: "active"
    severity: "H"
    summary: "append-only ファイルへの追記に Bash printf >> を使用"
    detail: "ファイル操作は常に専用ツール (Read/Edit/Write) を使う。追記も Edit で末尾に挿入する。ファイル内容の破損リスクがある。Bash の echo/printf/cat によるファイル書き込みは禁止"
    source: "B44 self-review, Lead"
    created_at: "2026-03-07T04:35:58+0900"
  - id: "K4"
    status: "active"
    severity: "H"
    summary: "hatch-vcs で git tag 後に importlib.metadata.version() が旧バージョンを返す"
    detail: "editable install のメタデータキャッシュが原因。正しい修正: uv sync --reinstall-package {pkg} (NOT uv pip install -e .)。sdd-release の Post-Release Verification に反映済み"
    source: "release-automation Builder, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
  - id: "K5"
    status: "active"
    severity: "M"
    summary: "Markdown スキルファイル (AI agent instructions) の TDD パターン"
    detail: "RED = spec ACs が未実装であることを確認、GREEN = AC を満たすコンテンツ記述、REFACTOR = 設計との整合性レビュー。diff 検証が sync コピーの機能テスト相当。プロンプトエンジニアリングの TDD として継続使用"
    source: "release-automation Builder, buffer.md migration"
    created_at: "2026-03-07T14:02:23+0900"
  - id: "K6"
    status: "active"
    severity: "H"
    summary: "NL trigger (issue/decision/knowledge) は記録が第一。修正は別途"
    detail: "ユーザーが issue/decision/knowledge を報告したら、まず issues.yaml/decisions.yaml/knowledge.yaml に記録する。修正の実行は記録後に別のステップとして行う。I3/I13 の教訓"
    source: "I13"
    created_at: "2026-03-07T16:31:41+0900"
  - id: "K7"
    status: "active"
    severity: "M"
    summary: "install.sh は常に相対パスで実行する"
    detail: "settings.json の auto-approve は Bash(bash install.sh *) で相対パス登録。絶対パスだと開発者の環境次第でパスが変わるためマッチしない。bash install.sh --local --force が正しい呼び出し方"
    source: "I14"
    created_at: "2026-03-07T16:31:41+0900"
  - id: "K8"
    status: "active"
    severity: "H"
    summary: "SKILL.md description ベストプラクティス — skill-creator リサーチまとめ"
    detail: "(1) description は primary triggering mechanism — what it does + when to use it の両方を含める (2) pushy に書く — Claude は undertrigger 傾向。'Make sure to use this skill whenever...' パターン推奨 (3) 三人称で書く — system prompt に注入されるため人称不一致は discovery 問題を起こす (4) Agent Skills 標準: name と description は required、description は max 1024 chars、XMLタグ禁止 (5) Anthropic 公式 skill-creator (anthropics/skills リポ) に eval + description 最適化ループあり。plugin install example-skills@anthropic-agent-skills で導入可能 (6) 5-10 の具体的キーワードフレーズを含める。30 の汎用ワードより効果的。公式ソース: platform.claude.com/docs/en/agents-and-tools/agent-skills/best-practices, agentskills.io/specification"
    source: "skill-creator リサーチ"
    created_at: "2026-03-07T17:35:50+0900"
  - id: "K11"
    status: "active"
    severity: "H"
    summary: "skill-creator は SubAgent 自動実行で高品質なスキルを生成する — 手動より優れた結果"
    detail: "project-intro スキル作成テストで、skill-creator SubAgent が手動 baseline を全面的に上回る SKILL.md を生成。42K tokens / 63秒。優位点: (1) description が K8 ベストプラクティスに自動準拠 (pushy, 20+キーワード, エッジケースカバー) (2) 4段階の構造化ステップ (Gather→Parse/Classify→Identify Patterns→Compose) (3) 出力テンプレート完全記述 (4) 6テーマカテゴリ具体例 (5) 6項目のガイドライン (cite, narrative, severity, superseded, depth adaptation, language matching) (6) allowed-tools 明示。手動は35行・3ステップの概要指示にとどまった。disable-model-invocation を外し SubAgent 経由で自動実行する方式が有効"
    source: "skill-creator SubAgent テスト"
    created_at: "2026-03-07T23:27:48+0900"
  - id: "K12"
    status: "active"
    severity: "H"
    summary: "K9 訂正 — description-based triggering は機能する。前回テストの条件が不適切だった"
    detail: "iteration-2 eval-2 で baseline は sdd-start を trigger し、with_skill は project-intro を trigger した。description-based triggering は機能している。K9 の「記録系スキルは triggering に向かない」は、sdd-log 固有の問題 (短い記録クエリを Claude が直接処理する) であり、一般的な結論ではなかった。cold-start 型の substantive なクエリでは Skill triggering は正常に動作する"
    source: "project-intro eval iteration-2"
    created_at: "2026-03-07T23:27:48+0900"
  - id: "K13"
    status: "active"
    severity: "M"
    summary: "CLAUDE.md にパスが書いてあるプロジェクトでは baseline も同じファイルに到達可能"
    detail: "project-intro eval で baseline (スキルなし) も .sdd/session/decisions.yaml を読んで詳細な歴史ナラティブを生成した。CLAUDE.md にファイルパスが記載されているため。スキルの差別化は「読むべきファイルの指示」ではなく「情報の合成方法・構造化の指示」にある"
    source: "project-intro eval iteration-2"
    created_at: "2026-03-07T23:27:48+0900"
  - id: "K14"
    status: "active"
    severity: "H"
    summary: "forge-skill は要求のみ渡した方が高品質なスキルを生成する — 詳細要件は翻訳者に退化させる"
    detail: "sdd-handover 再生成テストで比較。詳細要件版 (bak2) は要件の転記。要求のみ版 (v4) は目的説明の自発追加、変数命名 (ARCHIVE_SLUG)、Edge Cases 独立セクション、関連知見の自発引用など設計者としての判断が多数。K13 の逆: 要件を渡しすぎると SubAgent は翻訳者に退化する"
    source: "sdd-handover forge-skill テスト"
    created_at: "2026-03-08T02:29:10+0900"
  - id: "K15"
    status: "active"
    severity: "M"
    summary: "forge-skill SubAgent の他スキル参照は品質に小さな影響 — 禁止しても同等以上の結果"
    detail: "v3 (他スキル参照あり) vs v4 (参照禁止) 比較。v3 は sdd-log/sdd-start を読んで instructions タグ等の構造パターンを倣った。v4 は decisions.yaml を自発的に活用。品質差は小さいが方向性が異なる: v3 は型にはまった統一感、v4 は独自の設計判断が多い"
    source: "sdd-handover forge-skill テスト"
    created_at: "2026-03-08T02:29:10+0900"
  - id: "K16"
    status: "active"
    severity: "M"
    summary: "GitHub のソースコード取得は WebFetch より gh CLI を使うべき"
    detail: "WebFetch は GitHub の raw コンテンツ取得で頻繁に失敗する。システムが認証済みの gh CLI を提供しているので、gh api repos/{owner}/{repo}/contents/{path} -q .content | base64 -d でソースを取得する方が確実"
    source: "user"
    created_at: "2026-03-08T02:39:00+0900"
  - id: "K17"
    status: "active"
    severity: "M"
    summary: "gh api の URL にクエリパラメータを含める場合はクォートで囲む"
    detail: "gh api repos/owner/repo/git/trees/main?recursive=1 のようにクエリパラメータを含めると、Bash セキュリティヒューリスティクスが locale quoting を検出して警告を出す。URL 全体をダブルクォートで囲む: gh api \"repos/.../trees/main?recursive=1\""
    source: "user"
    created_at: "2026-03-08T02:44:17+0900"
  - id: "K18"
    status: "active"
    severity: "H"
    summary: "reforge の backup は mv を使うべき — cp だと writer SubAgent が旧ファイルを読むリスク"
    detail: "reforge Step 1 で SKILL.md を .bak{N} に退避する際、cp ではなく mv を使う。mv なら物理的にファイルが消えるので、writer SubAgent が「読むな」指示を無視しても旧ファイルにアクセスできない。プロンプト制約よりファイルシステム制約の方が確実"
    source: "user"
    created_at: "2026-03-08T05:01:50+0900"
  - id: "K19"
    status: "active"
    severity: "H"
    summary: "reforge 時、install 先 (.claude/skills/) の旧版が writer SubAgent のコンテキスト汚染源になる"
    detail: "framework/ の SKILL.md を mv しても .claude/skills/ にインストール済みの旧版が残る。writer SubAgent が references/writer.md を Read する指示に従うと、install 先の旧版を読んでしまう。K18 (mv による物理除去) の盲点。対策: reforge 前に install 先も mv するか、writer への Read 指示パスを明示的に framework/ 配下に限定する"
    source: "lead"
    created_at: "2026-03-08T05:56:11+0900"
- id: "K21"
    status: "active"
    severity: "H"
    summary: "timeout はデッドロック防止に必須 — タイムアウト時は ENGINE_FAILURE としてエンジン切替"
    detail: "外部エージェントのハングアップ時、tmux wait-for がブロッキングになりデッドロックする。タイムアウト時のエスカレーションは ENGINE_FAILURE として扱うべき — Level だけ上げても同一エンジンプロバイダの API 障害では再度失敗する。codex→claude、claude→L0 のようにエンジン自体を切り替える必要がある"
    source: "user"
    created_at: "2026-03-08T14:15:02+0900"
  - id: "K22"
    status: "active"
    severity: "M"
    summary: "send-keys 残存チェックは疎通確認 — ゾンビ検出ではない"
    detail: "pgrep -fl 'tmux send-keys' の趣旨は「send-keys が正常にターゲット pane に到達したかの疎通確認」。正常なら send-keys は即座に完了しプロセスが消える。残存は pane のフリーズや受付不能を示す。機能名を「ゾンビ確認」から「send-keys 疎通確認 (delivery check)」等に変更すべき"
    source: "user"
    created_at: "2026-03-08T14:20:58+0900"
  - id: "K23"
    status: "active"
    severity: "H"
    summary: "reforge は具体的ツール名 (AskUserQuestion 等) を消失させる — 外部インターフェース棚卸しで防止"
    detail: "forge-skill reforge の Writer SubAgent はスキルをゼロから再生成するため、旧版にあった具体的ツール名やプラットフォーム固有の知識が自然言語に退化する。sdd-handover I30 では AskUserQuestion の明示指定が消え、Lead がテキスト出力のみで質問 → ユーザーが完了と誤認 → handover.md 未生成。reforge Step 3 (External Interface Inventory) で「ユーザーインタラクション手段」も棚卸し対象に含め、Writer への要求に具体的ツール名を渡す必要がある"
    source: "I30"
    created_at: "2026-03-08T14:43:31+0900"

  - id: "K24"
    status: "active"
    severity: "H"
    summary: "Skill ネストは Claude Code の confirmed bug (#17351) — non-terminal ネストで親が停止する"
    detail: "Skill A が Skill B を呼び、B 完了後に A が続行する non-terminal ネストで、A の実行コンテキストが消失し停止する。#17351 (OPEN, Anthropic 未対応, v2.1.3〜v2.1.63+)。terminal な委譲 (A→B で A の後続なし) は問題なし。対策: Skill 呼び出しではなく prompt ファイルを Read して inline 実行する。K20 を superseded にする"
    source: "I40 リサーチ (GitHub issues #17351, #30256, #30028)"
    created_at: "2026-03-09T01:14:34+0900"

  - id: "K25"
    status: "active"
    severity: "H"
    summary: "tmux wait-for の close channel は 1 対 1 — 複数 pane が同一 channel を待つと 1 つしか解放されない"
    detail: "hold-and-release パターンで複数 Inspector が同じ close_channel を wait-for する場合、tmux wait-for -S は 1 つの waiter しか解放しない。waiter 数分の signal を送る必要がある。B48 で codex→claude の 2 ラウンド実行時に、第 1 ラウンドの close-B48 が一部 pane で未解放のまま残り、第 2 ラウンドの開始がブロックされた"
    source: "B48 runtime"
    created_at: "2026-03-10T01:37:37+0900"

  - id: "K26"
    status: "active"
    severity: "M"
    summary: "send-keys の Bash(run_in_background) 完了通知は Inspector 完了を意味しない"
    detail: "tmux send-keys は即座に返るため、Bash(run_in_background) の task-notification は send-keys の配信完了を示すだけ。Inspector の実行完了を検知するには、別途 tmux wait-for {channel} を Bash(run_in_background) で発行する必要がある"
    source: "B48 runtime"
    created_at: "2026-03-10T01:37:37+0900"
