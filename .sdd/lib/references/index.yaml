# Reference Document Index
# Skills read this index to select relevant reference documents by topic.
# Paths are relative to .sdd/lib/references/
# load: always    — unconditionally read (common/ documents). keywords on always entries serve as human-readable topic index only.
# load: on_demand — read when keywords match the task
# load: explicit  — read only when a skill/prompt explicitly names this document

entries:
  - path: common/bash-security-heuristics.md
    category: platform
    load: always
    summary: "Claude Code Bash security heuristics avoidance guide — patterns and alternatives to avoid approval prompts"
    keywords: [bash, security, heuristics, approval, settings.json, allow-list, tmux, shell]

  - path: common/bash-security-heuristics-sources.md
    category: procedure
    load: explicit
    summary: "Test cases and verification procedure for bash-security-heuristics.md — 163 cases, re-test runbook"
    keywords: [update, sources, bash, security, heuristics, test-cases, verification]

  - path: common/tmux-integration.md
    category: platform
    load: always
    summary: "tmux integration patterns — MultiView Grid, Slot Management, Pattern A (Server Lifecycle), Pattern B (One-Shot Command), Orphan Cleanup"
    keywords: [tmux, pane, grid, slot, multiview, server, one-shot, orphan, send-keys, wait-for]

  - path: claude/agent-tool.md
    category: platform
    load: on_demand
    summary: "Agent tool specification — subagent_type, model, run_in_background, built-in types, model aliases"
    keywords: [subagent_type, run_in_background, model-alias, built-in-types, agent-dispatch]

  - path: claude/agent-tool-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for agent-tool.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, agent-tool]

  - path: claude/subagent-file.md
    category: platform
    load: on_demand
    summary: "Subagent file (.claude/agents/*.md) YAML frontmatter specification — model, tools, description, hooks"
    keywords: [agents-dir, yaml-frontmatter, subagent-file, hooks, subagent-model, subagent-tools]

  - path: claude/subagent-file-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for subagent-file.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, subagent-file]

  - path: claude/agent-team.md
    category: platform
    load: explicit
    summary: "Agent Team (experimental) specification — teammateMode, cost, plan approval, limitations"
    keywords: [agent-team, teammate, experimental, cost, plan, multi-agent]

  - path: claude/agent-team-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for agent-team.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, agent-team]

  - path: claude/skill-authoring.md
    category: platform
    load: on_demand
    summary: "Agent Skills specification — SKILL.md format, frontmatter, description, allowed-tools, triggering"
    keywords: [skill, SKILL.md, frontmatter, description, triggering, allowed-tools]

  - path: claude/skill-authoring-sources.md
    category: procedure
    load: explicit
    summary: "Update procedure for skill-authoring.md — official documentation excerpts and critical evidence"
    keywords: [update, sources, skill-authoring]
